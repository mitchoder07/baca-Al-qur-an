<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Read Quran — Al Furqan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --page-bg: #fdf8f0;
            --accent: #8b6914;
            --border: #d4b896;
            --ui-bg: #0a0f1e;
            --ui-text: #f1f5f9;
            --ui-border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--ui-bg);
            font-family: "Poppins", sans-serif;
            overflow: hidden;
        }

        /* ── REAL QURAN GLYPH FONT (QCF4) — this is what quran.com uses ── */
        @font-face {
            font-family: "QCF4_Hafs_01";
            src: url("https://cdn.jsdelivr.net/gh/MohamadHajjRabee/quran-qcf4@main/fonts-woff2/QCF4_Hafs_01_W.woff2") format("woff2");
            font-display: swap;
        }

        @font-face {
            font-family: "QCF4_QBSML";
            src: url("https://cdn.jsdelivr.net/gh/MohamadHajjRabee/quran-qcf4@main/fonts-woff2/QCF4_QBSML_W.woff2") format("woff2");
            font-display: swap;
        }

        /* ── TOP BAR — fixed squish: wraps gracefully, no overlap ── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 54px;
            z-index: 100;
            background: rgba(10, 15, 30, 0.97);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--ui-border);
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: .5rem;
            padding: 0 .7rem;
        }

        .tb-logo {
            color: var(--green);
            font-weight: 700;
            font-size: 1.05rem;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tb-nav-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .3rem;
            min-width: 0;
        }

        .tb-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.07);
            color: var(--ui-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .78rem;
            transition: .18s;
            flex-shrink: 0;
            user-select: none;
        }

        .tb-btn:hover:not(:disabled) {
            background: var(--green);
        }

        .tb-btn:disabled {
            opacity: .3;
            cursor: default;
        }

        .tb-center-info {
            text-align: center;
            min-width: 0;
            flex-shrink: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 .3rem;
        }

        .tb-page-label {
            color: var(--ui-text);
            font-size: .72rem;
            font-weight: 700;
            white-space: nowrap;
            line-height: 1.2;
        }

        .tb-surah-label {
            color: #64748b;
            font-size: .62rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .tb-right-group {
            display: flex;
            align-items: center;
            gap: .35rem;
            flex-shrink: 0;
        }

        .page-jump {
            width: 42px;
            height: 28px;
            text-align: center;
            border-radius: 7px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.07);
            color: var(--ui-text);
            font-family: inherit;
            font-size: .7rem;
            outline: none;
        }

        .page-jump:focus {
            border-color: var(--green);
        }

        /* ── MAIN ── */
        .main {
            position: fixed;
            top: 54px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #111827 0%, #0a0f1e 100%);
            overflow: hidden;
        }

        /* ── SPREAD (desktop: 2 pages) ── */
        .spread {
            display: flex;
            align-items: stretch;
            height: calc(100vh - 54px - 16px);
            max-height: 880px;
            filter: drop-shadow(0 24px 64px rgba(0, 0, 0, 0.7));
        }

        .mpage {
            background: var(--page-bg);
            width: min(40vw, 410px);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .mpage.rp {
            border-radius: 6px 0 0 6px;
        }

        .mpage.lp {
            border-radius: 0 6px 6px 0;
        }

        .mpage.rp::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 14px;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.15), transparent);
            pointer-events: none;
        }

        .mpage.lp::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 14px;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.15), transparent);
            pointer-events: none;
            z-index: 2;
        }

        .page-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px 7px;
            border-bottom: 1.5px solid var(--border);
            flex-shrink: 0;
        }

        .page-top span {
            font-size: .66rem;
            color: var(--accent);
            font-family: "Amiri", serif;
            font-weight: 700;
        }

        .page-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 18px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 2px;
            direction: rtl;
        }

        .page-content::-webkit-scrollbar {
            width: 0;
        }

        /* Each line gets a touch more breathing room so 15-line pages
       fill the page height evenly, like a real printed Mushaf */
        .mushaf-line {
            margin-bottom: 6px;
        }

        /* Mushaf line — justified like the real printed page */
        .mushaf-line {
            display: flex;
            justify-content: center;
            align-items: baseline;
            flex-wrap: nowrap;
            direction: rtl;
            min-height: 34px;
            width: 100%;
        }

        .mushaf-line.justify-line {
            justify-content: space-between;
        }

        /* Surah name header band — distinct box, own line, breathing room */
        .surah-header-line {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0 4px;
            padding: 8px 12px;
            border-top: 1.5px solid var(--border);
            border-bottom: 1.5px solid var(--border);
            background: rgba(139, 105, 20, 0.05);
            font-family: "Amiri", serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--accent);
            direction: rtl;
            text-align: center;
            line-height: 1.5;
        }

        /* Bismillah — its own centered line, separated visually from surah name */
        .bismillah-line {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px 0 14px;
            font-family: "QCF4_Hafs_01", "Amiri", serif;
            font-size: 1.5rem;
            color: #1a0a00;
            direction: rtl;
        }

        .qcf-word {
            font-family: "QCF4_Hafs_01", "Amiri", serif;
            font-size: 1.55rem;
            color: #1a0a00;
            line-height: 1.9;
            white-space: nowrap;
        }

        /* Verse-end marker — small circular ornament with the number inside,
       NOT raw "V1" text. This matches how a real Mushaf prints ayah numbers. */
        .verse-end-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.55em;
            height: 1.55em;
            margin: 0 3px;
            border-radius: 50%;
            border: 1.3px solid var(--accent);
            background: rgba(139, 105, 20, 0.06);
            font-family: "Amiri", serif;
            font-weight: 700;
            font-size: 0.62rem;
            color: var(--accent);
            vertical-align: middle;
            line-height: 1;
            flex-shrink: 0;
        }

        .page-bot {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px 16px 10px;
            border-top: 1.5px solid var(--border);
            flex-shrink: 0;
        }

        .page-diamond {
            width: 24px;
            height: 24px;
            border: 1.5px solid var(--border);
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-diamond span {
            transform: rotate(-45deg);
            font-size: .58rem;
            color: var(--accent);
            font-weight: 700;
        }

        .page-loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Amiri", serif;
            color: var(--accent);
            font-size: 1rem;
            direction: ltr;
        }

        /* ── SIDE PANEL ── */
        .side-panel {
            position: fixed;
            top: 54px;
            right: 0;
            bottom: 0;
            width: 260px;
            background: rgba(10, 15, 30, 0.99);
            border-left: 1px solid var(--ui-border);
            display: flex;
            flex-direction: column;
            z-index: 90;
            transform: translateX(100%);
            transition: transform .25s ease;
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-hd {
            padding: .8rem .9rem;
            border-bottom: 1px solid var(--ui-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-hd-title {
            color: var(--ui-text);
            font-weight: 700;
            font-size: .85rem;
        }

        .panel-close {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
        }

        .panel-srch {
            margin: .6rem .8rem;
            height: 34px;
            border-radius: 9px;
            border: 1px solid var(--ui-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--ui-text);
            padding: 0 .7rem;
            font-family: inherit;
            font-size: .78rem;
            outline: none;
        }

        .panel-srch:focus {
            border-color: var(--green);
        }

        .panel-list {
            flex: 1;
            overflow-y: auto;
            padding: .3rem 0;
        }

        .panel-row {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .5rem .8rem;
            cursor: pointer;
            transition: .15s;
        }

        .panel-row:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .panel-num {
            width: 24px;
            height: 24px;
            border-radius: 7px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            font-size: .65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .panel-info {
            flex: 1;
            min-width: 0;
        }

        .panel-en {
            font-size: .76rem;
            color: var(--ui-text);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .panel-ar {
            font-family: "Amiri", serif;
            font-size: .85rem;
            color: #94a3b8;
            direction: rtl;
        }

        .panel-pg {
            font-size: .65rem;
            color: #475569;
            flex-shrink: 0;
        }

        .panel-list::-webkit-scrollbar {
            width: 3px;
        }

        .panel-list::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }

        /* ── MOBILE — ONE page at a time, true single-page paging ── */
        @media(max-width:680px) {
            .topbar {
                grid-template-columns: auto 1fr auto;
                padding: 0 .5rem;
            }

            .tb-logo {
                font-size: .92rem;
            }

            .tb-btn {
                width: 28px;
                height: 28px;
                font-size: .7rem;
            }

            .page-jump {
                width: 36px;
                height: 26px;
                font-size: .65rem;
            }

            .tb-page-label {
                font-size: .66rem;
            }

            .tb-surah-label {
                font-size: .58rem;
                max-width: 90px;
            }

            .spread {
                height: calc(100vh - 54px - 12px);
            }

            .mpage {
                width: min(94vw, 420px);
            }

            .mpage.lp {
                display: none !important;
            }

            .mpage.rp {
                border-radius: 6px;
                width: 94vw;
            }

            .mpage.rp::after {
                display: none;
            }

            .qcf-word {
                font-size: 1.3rem;
            }

            .surah-header-line {
                font-size: 1.3rem;
            }

            .bismillah-line {
                font-size: 1.25rem;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">
        <a class="tb-logo" href="index.html">Al Furqan</a>

        <div class="tb-nav-group">
            <button class="tb-btn" id="btn-first" title="First">⏮</button>
            <button class="tb-btn" id="btn-prev" title="Previous">◀</button>
            <div class="tb-center-info">
                <div class="tb-page-label" id="page-label">Page 1 / 604</div>
                <div class="tb-surah-label" id="surah-label">Al-Fatihah · Juz 1</div>
            </div>
            <button class="tb-btn" id="btn-next" title="Next">▶</button>
            <button class="tb-btn" id="btn-last" title="Last">⏭</button>
        </div>

        <div class="tb-right-group">
            <input class="page-jump" id="page-jump" type="number" min="1" max="604" placeholder="p.">
            <button class="tb-btn" id="btn-panel" title="Surah list">☰</button>
        </div>
    </header>

    <div class="main">
        <div class="spread" id="spread">
            <div class="mpage rp" id="rp">
                <div class="page-top" id="rp-top" style="display:none">
                    <span id="rp-surah">—</span><span id="rp-juz">—</span><span id="rp-num">—</span>
                </div>
                <div class="page-content" id="rp-content">
                    <div class="page-loading" id="rp-loading">Loading page…</div>
                </div>
                <div class="page-bot" id="rp-bot" style="display:none">
                    <div class="page-diamond"><span id="rp-dn">1</span></div>
                </div>
            </div>
            <div class="mpage lp" id="lp">
                <div class="page-top" id="lp-top" style="display:none">
                    <span id="lp-surah">—</span><span id="lp-juz">—</span><span id="lp-num">—</span>
                </div>
                <div class="page-content" id="lp-content">
                    <div class="page-loading" id="lp-loading">Loading page…</div>
                </div>
                <div class="page-bot" id="lp-bot" style="display:none">
                    <div class="page-diamond"><span id="lp-dn">2</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="side-panel" id="side-panel">
        <div class="panel-hd">
            <span class="panel-hd-title">Jump to Surah</span>
            <button class="panel-close" id="panel-close">✕</button>
        </div>
        <input class="panel-srch" id="panel-srch" placeholder="Search surah…">
        <div class="panel-list" id="panel-list"></div>
    </div>

            { id: 77, en: "Al-Mursalat", ar: "المرسلات", p: 580 }, { id: 78, en: "An-Naba", ar: "النبإ", p: 582 },
            { id: 79, en: "An-Nazi'at", ar: "النازعات", p: 583 }, { id: 80, en: "'Abasa", ar: "عبس", p: 585 },
            { id: 81, en: "At-Takwir", ar: "التكوير", p: 586 }, { id: 82, en: "Al-Infitar", ar: "الإنفطار", p: 587 },
            { id: 83, en: "Al-Mutaffifin", ar: "المطففين", p: 587 }, { id: 84, en: "Al-Inshiqaq", ar: "الإنشقاق", p: 589 },
            { id: 85, en: "Al-Buruj", ar: "البروج", p: 590 }, { id: 86, en: "At-Tariq", ar: "الطارق", p: 591 },
            { id: 87, en: "Al-A'la", ar: "الأعلى", p: 591 }, { id: 88, en: "Al-Ghashiyah", ar: "الغاشية", p: 592 },
            { id: 89, en: "Al-Fajr", ar: "الفجر", p: 593 }, { id: 90, en: "Al-Balad", ar: "البلد", p: 594 },
            { id: 91, en: "Ash-Shams", ar: "الشمس", p: 595 }, { id: 92, en: "Al-Layl", ar: "الليل", p: 595 },
            { id: 93, en: "Ad-Duha", ar: "الضحى", p: 596 }, { id: 94, en: "Ash-Sharh", ar: "الشرح", p: 596 },
            { id: 95, en: "At-Tin", ar: "التين", p: 597 }, { id: 96, en: "Al-'Alaq", ar: "العلق", p: 597 },
            { id: 97, en: "Al-Qadr", ar: "القدر", p: 598 }, { id: 98, en: "Al-Bayyinah", ar: "البينة", p: 598 },
            { id: 99, en: "Az-Zalzalah", ar: "الزلزلة", p: 599 }, { id: 100, en: "Al-'Adiyat", ar: "العاديات", p: 599 },
            { id: 101, en: "Al-Qari'ah", ar: "القارعة", p: 600 }, { id: 102, en: "At-Takathur", ar: "التكاثر", p: 600 },
            { id: 103, en: "Al-'Asr", ar: "العصر", p: 601 }, { id: 104, en: "Al-Humazah", ar: "الهمزة", p: 601 },
            { id: 105, en: "Al-Fil", ar: "الفيل", p: 601 }, { id: 106, en: "Quraysh", ar: "قريش", p: 602 },
            { id: 107, en: "Al-Ma'un", ar: "الماعون", p: 602 }, { id: 108, en: "Al-Kawthar", ar: "الكوثر", p: 602 },
            { id: 109, en: "Al-Kafirun", ar: "الكافرون", p: 603 }, { id: 110, en: "An-Nasr", ar: "النصر", p: 603 },
            { id: 111, en: "Al-Masad", ar: "المسد", p: 603 }, { id: 112, en: "Al-Ikhlas", ar: "الإخلاص", p: 604 },
            { id: 113, en: "Al-Falaq", ar: "الفلق", p: 604 }, { id: 114, en: "An-Nas", ar: "الناس", p: 604 },
        ];
        const JUZ_P = [1, 22, 42, 62, 82, 102, 121, 142, 162, 182, 201, 221, 241, 261, 281, 301, 321, 341, 361, 381, 401, 421, 441, 461, 481, 501, 521, 542, 562, 582];
        function getJuz(p) { let j = 1; for (let i = 0; i < JUZ_P.length; i++) { if (p >= JUZ_P[i]) j = i + 1; else break; } return j; }
        function getSurah(p) { let s = SM[0]; for (const x of SM) { if (x.p <= p) s = x; else break; } return s; }

        // ═══════════════════════════════════════════════════════
        // FETCH + RENDER A SINGLE PAGE (using real QCF4 glyph JSON)
        // ═══════════════════════════════════════════════════════
        const pageCache = {};

        async function fetchPageData(n) {
            if (pageCache[n]) return pageCache[n];
            const p = String(n).padStart(3, "0");
            // jsDelivr mirrors GitHub raw files WITH proper CORS headers —
            // raw.githubusercontent.com often fails fetch() from browsers (CORS),
            // even though the file itself loads fine if opened directly in a tab.
            const primaryUrl = `https://cdn.jsdelivr.net/gh/MohamadHajjRabee/quran-qcf4@main/pages/${p}.json`;
            const fallbackUrl = `https://raw.githubusercontent.com/MohamadHajjRabee/quran-qcf4/main/pages/${p}.json`;

            let res;
            try {
                res = await fetch(primaryUrl);
                if (!res.ok) throw new Error("jsDelivr status " + res.status);
            } catch (e1) {
                console.warn("jsDelivr fetch failed, trying raw.githubusercontent fallback:", e1);
                res = await fetch(fallbackUrl);
                if (!res.ok) throw new Error("Both sources failed: " + res.status);
            }

            const data = await res.json();
            pageCache[n] = data;
            return data;
        }

        // Convert ayah number to Arabic-Indic numerals (١٢٣ style) like a real Mushaf
        function toArabicNumeral(num) {
            const arabicDigits = ["٠", "١", "٢", "٣", "٤", "٥", "٦", "٧", "٨", "٩"];
            return String(num).split("").map(d => arabicDigits[parseInt(d)] ?? d).join("");
        }

        function renderLineHtml(line) {
            // Surah header line — name only, own distinct band (no Bismillah merged in)
            const headerWord = line.words.find(w => w.type === "surah_header");
            if (headerWord) {
                return `<div class="surah-header-line">${headerWord.text}</div>`;
            }

            // Build words for this line
            const wordsHtml = line.words.map(w => {
                if (w.type === "end") {
                    // w.text looks like "V1", "V2" etc — extract just the number
                    const num = (w.text.match(/\d+/) || ["?"])[0];
                    const arabicNum = toArabicNumeral(num);
                    return `<span class="verse-end-circle">${arabicNum}</span>`;
                }
                return `<span class="qcf-word">${w.text}</span>`;
            }).join(" ");

            return `<div class="mushaf-line justify-line">${wordsHtml}</div>`;
        }

        async function loadPage(side, n) {
            const content = document.getElementById(`${side}-content`);
            const top = document.getElementById(`${side}-top`);
            const bot = document.getElementById(`${side}-bot`);

            content.innerHTML = `<div class="page-loading">Loading page…</div>`;
            top.style.display = "none";
            bot.style.display = "none";

            const s = getSurah(n);
            const j = getJuz(n);
            document.getElementById(`${side}-surah`).textContent = s.en;
            document.getElementById(`${side}-juz`).textContent = "Juz " + j;
            document.getElementById(`${side}-num`).textContent = "Page " + n;
            document.getElementById(`${side}-dn`).textContent = n;

            try {
                const data = await fetchPageData(n);

                // Check for Bismillah special line (every surah except 1 and 9 starts with it,
                // but the QCF4 data already encodes it inline as part of line words typically;
                // if not present, we don't force-add one to avoid duplicating data)
                const linesHtml = data.lines.map(renderLineHtml).join("");
                content.innerHTML = linesHtml;

                top.style.display = "flex";
                bot.style.display = "flex";
            } catch (err) {
                // Diagnostic message — tells you exactly WHY it failed, not just that it did
                const isSandboxed = window.self !== window.top;
                const hint = isSandboxed
                    ? "This looks like a sandboxed preview (fetch() to external sites is often blocked here). Try opening this file directly in a real browser tab, or upload it to your live site — it should work there."
                    : `Network error: ${err.message}`;
                content.innerHTML = `<div class="page-loading" style="flex-direction:column;gap:8px;padding:1.5rem;text-align:center;">
      <div>Could not load page ${n}.</div>
      <div style="font-size:.7rem;opacity:.75;direction:ltr;max-width:280px;">${hint}</div>
    </div>`;
                console.error("Mushaf page load error:", err);
            }
        }

        function hidePage(side) {
            document.getElementById(side).style.display = "none";
        }
        function showPage(side) {
            document.getElementById(side).style.display = "flex";
        }

        // ═══════════════════════════════════════════════════════
        // STATE + NAVIGATION
        // ═══════════════════════════════════════════════════════
        let cur = Math.max(1, Math.min(604, Number(localStorage.getItem("mushafPage") || 1)));

        function go(n) {
            n = Math.max(1, Math.min(604, n));
            cur = n;
            localStorage.setItem("mushafPage", n);

            const mobile = isMobile();
            const s = getSurah(n);
            const j = getJuz(n);

            document.getElementById("page-label").textContent = mobile ? `Page ${n} / 604` : `Page ${n}-${Math.min(n + 1, 604)} / 604`;
            document.getElementById("surah-label").textContent = `${s.en} · Juz ${j}`;
            document.getElementById("page-jump").value = n;

            document.getElementById("btn-prev").disabled = n <= 1;
            document.getElementById("btn-first").disabled = n <= 1;
            document.getElementById("btn-next").disabled = mobile ? n >= 604 : n >= 603;
            document.getElementById("btn-last").disabled = mobile ? n >= 604 : n >= 603;

            if (mobile) {
                // ── MOBILE: exactly ONE page, left page hidden entirely ──
                showPage("rp");
                hidePage("lp");
                loadPage("rp", n);
            } else {
                // ── DESKTOP: two-page spread, right=current(odd), left=current+1 ──
                let rightP = n % 2 === 0 ? n - 1 : n;
                let leftP = rightP + 1;
                showPage("rp");
                loadPage("rp", rightP);
                if (leftP <= 604) {
                    showPage("lp");
                    loadPage("lp", leftP);
                } else {
                    hidePage("lp");
                }
            }
        }

        document.getElementById("btn-first").onclick = () => go(1);
        document.getElementById("btn-prev").onclick = () => go(isMobile() ? cur - 1 : cur - 2);
        document.getElementById("btn-next").onclick = () => go(isMobile() ? cur + 1 : cur + 2);
        document.getElementById("btn-last").onclick = () => go(isMobile() ? 604 : 603);

        document.getElementById("page-jump").addEventListener("change", e => {
            const v = parseInt(e.target.value) || 1;
            go(v);
        });

        document.addEventListener("keydown", e => {
            if (e.target.tagName === "INPUT") return;
            const step = isMobile() ? 1 : 2;
            if (e.key === "ArrowRight" || e.key === "ArrowUp") go(cur - step);
            if (e.key === "ArrowLeft" || e.key === "ArrowDown") go(cur + step);
            if (e.key === "Home") go(1);
            if (e.key === "End") go(isMobile() ? 604 : 603);
        });

        // Re-render on resize crossing the mobile breakpoint
        let lastMobileState = isMobile();
        window.addEventListener("resize", () => {
            const nowMobile = isMobile();
            if (nowMobile !== lastMobileState) {
                lastMobileState = nowMobile;
                go(cur);
            }
        });

        // ═══════════════════════════════════════════════════════
        // SURAH PANEL
        // ═══════════════════════════════════════════════════════
        function buildPanel(q = "") {
            const list = document.getElementById("panel-list");
            const lc = q.toLowerCase();
            const items = SM.filter(s => !lc || s.en.toLowerCase().includes(lc) || s.ar.includes(lc) || String(s.id) === lc);
            list.innerHTML = items.map(s => `
    <div class="panel-row" data-p="${s.p}">
      <div class="panel-num">${s.id}</div>
      <div class="panel-info"><div class="panel-en">${s.en}</div><div class="panel-ar">${s.ar}</div></div>
      <div class="panel-pg">p.${s.p}</div>
    </div>`).join("");
            list.querySelectorAll(".panel-row").forEach(r => {
                r.onclick = () => { go(Number(r.dataset.p)); closePanel(); };
            });
        }
        function closePanel() { document.getElementById("side-panel").classList.remove("open"); }
        document.getElementById("btn-panel").onclick = () => document.getElementById("side-panel").classList.toggle("open");
        document.getElementById("panel-close").onclick = closePanel;
        document.getElementById("panel-srch").addEventListener("input", e => buildPanel(e.target.value));

        // ═══════════════════════════════════════════════════════
        // INIT — wait for fonts before first render to avoid FOUC
        // ═══════════════════════════════════════════════════════
        buildPanel();

        Promise.all([
            document.fonts.load("1rem QCF4_Hafs_01"),
            document.fonts.load("1rem QCF4_QBSML"),
        ]).finally(() => {
            go(cur);
        });

        // Fallback: render anyway after 2.5s even if fonts haven't resolved
        setTimeout(() => { if (!document.getElementById("rp-content").children.length || document.getElementById("rp-content").querySelector(".page-loading")) go(cur); }, 2500);
    </script>
</body>
