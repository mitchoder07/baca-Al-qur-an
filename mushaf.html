<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Read Quran — Al Furqan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #1a0a00;
            --page-bg: #fdf8f0;
            --page-shadow: rgba(0, 0, 0, 0.18);
            --accent: #8b6914;
            --accent-light: rgba(139, 105, 20, 0.12);
            --border: #d4b896;
            --ui-bg: #0f172a;
            --ui-text: #f1f5f9;
            --ui-border: rgba(255, 255, 255, 0.08);
            --green: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--ui-bg);
            font-family: "Poppins", sans-serif;
            overflow: hidden;
        }

        /* ── TOP BAR ── */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 58px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--ui-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.2rem;
            gap: 1rem;
        }

        .tb-logo {
            color: var(--green);
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            flex-shrink: 0;
        }

        .tb-center {
            display: flex;
            align-items: center;
            gap: .6rem;
            flex: 1;
            justify-content: center;
        }

        .tb-page-info {
            color: var(--ui-text);
            font-size: .85rem;
            font-weight: 600;
            min-width: 70px;
            text-align: center;
        }

        .tb-surah-info {
            color: #94a3b8;
            font-size: .78rem;
        }

        .tb-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            color: var(--ui-text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .95rem;
            transition: .18s;
            flex-shrink: 0;
        }

        .tb-btn:hover {
            background: var(--green);
        }

        .tb-btn:disabled {
            opacity: .3;
            cursor: default;
        }

        .tb-btn:disabled:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .tb-nav {
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .tb-right {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-shrink: 0;
        }

        /* page input */
        .page-input-wrap {
            position: relative;
        }

        .page-jump-input {
            width: 58px;
            height: 32px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
            color: var(--ui-text);
            font-family: inherit;
            font-size: .82rem;
            outline: none;
        }

        .page-jump-input:focus {
            border-color: var(--green);
        }

        /* ── MAIN AREA ── */
        .main {
            position: fixed;
            top: 58px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── MUSHAF SPREAD (two pages side by side) ── */
        .spread-wrap {
            display: flex;
            align-items: stretch;
            gap: 0;
            height: calc(100% - 24px);
            max-height: 900px;
            filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.55));
        }

        /* single page */
        .mushaf-page {
            position: relative;
            background: var(--page-bg);
            width: min(42vw, 420px);
            max-height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .mushaf-page.right-page {
            border-radius: 4px 0 0 4px;
        }

        .mushaf-page.left-page {
            border-radius: 0 4px 4px 0;
        }

        /* page spine shadow */
        .mushaf-page.right-page::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background: linear-gradient(to left, rgba(0, 0, 0, 0.12), transparent);
            pointer-events: none;
        }

        .mushaf-page.left-page::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.12), transparent);
            pointer-events: none;
            z-index: 2;
        }

        /* inner padding */
        .page-inner {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 22px 20px;
            overflow: hidden;
        }

        /* page header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1.5px solid var(--border);
        }

        .page-header-surah {
            font-family: "Amiri", serif;
            font-size: .82rem;
            color: var(--accent);
            font-weight: 700;
        }

        .page-header-num {
            font-size: .75rem;
            color: var(--accent);
            font-weight: 600;
        }

        .page-header-juz {
            font-size: .75rem;
            color: var(--accent);
        }

        /* bismillah */
        .bismillah-line {
            font-family: "Amiri Quran", "Amiri", serif;
            font-size: 1.55rem;
            text-align: center;
            color: var(--ink);
            margin: 6px 0 8px;
            line-height: 2;
            direction: rtl;
        }

        /* surah header band */
        .surah-header-band {
            text-align: center;
            margin: 6px 0 8px;
            padding: 5px 0;
            border-top: 1.5px solid var(--border);
            border-bottom: 1.5px solid var(--border);
        }

        .surah-name-arabic {
            font-family: "Amiri", serif;
            font-size: 1.3rem;
            color: var(--ink);
        }

        .surah-name-english {
            font-size: .68rem;
            color: var(--accent);
            margin-top: 1px;
        }

        /* verse text area */
        .verse-text-area {
            flex: 1;
            overflow: hidden;
            font-family: "Amiri Quran", "Amiri", serif;
            font-size: 1.28rem;
            line-height: 2.1;
            color: var(--ink);
            direction: rtl;
            text-align: justify;
        }

        /* verse number inline circle */
        .verse-num-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5em;
            height: 1.5em;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            color: var(--accent);
            font-family: "Poppins", sans-serif;
            font-size: .55rem;
            font-weight: 700;
            margin: 0 3px;
            vertical-align: middle;
            line-height: 1;
            flex-shrink: 0;
        }

        /* page footer */
        .page-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 8px;
            border-top: 1.5px solid var(--border);
            margin-top: 6px;
        }

        .page-num-diamond {
            width: 28px;
            height: 28px;
            border: 1.5px solid var(--border);
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-num-diamond span {
            transform: rotate(-45deg);
            font-size: .65rem;
            color: var(--accent);
            font-weight: 700;
        }

        /* ── SIDE PANEL (jump to surah) ── */
        .side-panel {
            position: fixed;
            top: 58px;
            right: 0;
            bottom: 0;
            width: 280px;
            background: rgba(15, 23, 42, 0.98);
            border-left: 1px solid var(--ui-border);
            display: flex;
            flex-direction: column;
            z-index: 90;
            transform: translateX(100%);
            transition: transform .25s ease;
        }

        .side-panel.open {
            transform: translateX(0);
        }

        .panel-header {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--ui-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            color: var(--ui-text);
            font-weight: 700;
            font-size: .95rem;
        }

        .panel-close {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.1rem;
            padding: .2rem;
        }

        .panel-search {
            margin: .8rem 1rem;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--ui-border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--ui-text);
            padding: 0 .8rem;
            font-family: inherit;
            font-size: .85rem;
            outline: none;
        }

        .panel-search:focus {
            border-color: var(--green);
        }

        .panel-list {
            flex: 1;
            overflow-y: auto;
            padding: .4rem 0;
        }

        .panel-surah-row {
            display: flex;
            align-items: center;
            gap: .8rem;
            padding: .6rem 1.2rem;
            cursor: pointer;
            transition: .15s;
            border-radius: 0;
        }

        .panel-surah-row:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .panel-surah-num {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            font-size: .72rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .panel-surah-name {
            flex: 1;
        }

        .panel-surah-name-en {
            font-size: .82rem;
            color: var(--ui-text);
            font-weight: 600;
        }

        .panel-surah-name-ar {
            font-family: "Amiri", serif;
            font-size: .95rem;
            color: #94a3b8;
            direction: rtl;
        }

        .panel-surah-page {
            font-size: .72rem;
            color: #64748b;
            flex-shrink: 0;
        }

        /* ── LOADING ── */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--page-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Amiri", serif;
            font-size: 1.2rem;
            color: var(--accent);
            z-index: 10;
        }

        /* ── MOBILE single page ── */
        @media(max-width:700px) {
            .mushaf-page {
                width: min(92vw, 400px);
            }

            .mushaf-page.left-page {
                display: none;
            }

            .mushaf-page.right-page {
                border-radius: 4px;
            }

            .mushaf-page.right-page::after {
                display: none;
            }
        }

        /* scrollbar */
        .panel-list::-webkit-scrollbar {
            width: 4px;
        }

        .panel-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel-list::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <!-- TOP BAR -->
    <header class="topbar">
        <a class="tb-logo" href="index.html">Baca</a>

        <div class="tb-center">
            <div class="tb-nav">
                <button class="tb-btn" id="btn-first" title="First page">⏮</button>
                <button class="tb-btn" id="btn-prev" title="Previous page">◀</button>
            </div>
            <div style="text-align:center">
                <div class="tb-page-info" id="page-label">Page 1</div>
                <div class="tb-surah-info" id="surah-label">Al-Fatihah</div>
            </div>
            <div class="tb-nav">
                <button class="tb-btn" id="btn-next" title="Next page">▶</button>
                <button class="tb-btn" id="btn-last" title="Last page">⏭</button>
            </div>
        </div>

        <div class="tb-right">
            <input class="page-jump-input" id="page-jump" type="number" min="1" max="604" placeholder="Go…"
                title="Jump to page">
            <button class="tb-btn" id="btn-surah-list" title="Surah list">☰</button>
        </div>
    </header>

    <!-- MUSHAF SPREAD -->
    <div class="main">
        <div class="spread-wrap">
            <!-- Right page (odd pages on right in Arabic mushaf) -->
            <div class="mushaf-page right-page" id="right-page">
                <div class="loading-overlay" id="right-loading">بِسْمِ اللَّهِ…</div>
                <div class="page-inner" id="right-inner" style="display:none"></div>
            </div>
            <!-- Left page (even pages on left) -->
            <div class="mushaf-page left-page" id="left-page">
                <div class="loading-overlay" id="left-loading">بِسْمِ اللَّهِ…</div>
                <div class="page-inner" id="left-inner" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- SURAH JUMP PANEL -->
    <div class="side-panel" id="side-panel">
        <div class="panel-header">
            <span class="panel-title">Jump to Surah</span>
            <button class="panel-close" id="panel-close">✕</button>
        </div>
        <input class="panel-search" id="panel-search" placeholder="Search surah…">
        <div class="panel-list" id="panel-list"></div>
    </div>

            { id: 82, name_en: "Al-Infitar", name_ar: "الإنفطار", page: 587, verses: 19 },
            { id: 83, name_en: "Al-Mutaffifin", name_ar: "المطففين", page: 587, verses: 36 },
            { id: 84, name_en: "Al-Inshiqaq", name_ar: "الإنشقاق", page: 589, verses: 25 },
            { id: 85, name_en: "Al-Buruj", name_ar: "البروج", page: 590, verses: 22 },
            { id: 86, name_en: "At-Tariq", name_ar: "الطارق", page: 591, verses: 17 },
            { id: 87, name_en: "Al-A'la", name_ar: "الأعلى", page: 591, verses: 19 },
            { id: 88, name_en: "Al-Ghashiyah", name_ar: "الغاشية", page: 592, verses: 26 },
            { id: 89, name_en: "Al-Fajr", name_ar: "الفجر", page: 593, verses: 30 },
            { id: 90, name_en: "Al-Balad", name_ar: "البلد", page: 594, verses: 20 },
            { id: 91, name_en: "Ash-Shams", name_ar: "الشمس", page: 595, verses: 15 },
            { id: 92, name_en: "Al-Layl", name_ar: "الليل", page: 595, verses: 21 },
            { id: 93, name_en: "Ad-Duha", name_ar: "الضحى", page: 596, verses: 11 },
            { id: 94, name_en: "Ash-Sharh", name_ar: "الشرح", page: 596, verses: 8 },
            { id: 95, name_en: "At-Tin", name_ar: "التين", page: 597, verses: 8 },
            { id: 96, name_en: "Al-'Alaq", name_ar: "العلق", page: 597, verses: 19 },
            { id: 97, name_en: "Al-Qadr", name_ar: "القدر", page: 598, verses: 5 },
            { id: 98, name_en: "Al-Bayyinah", name_ar: "البينة", page: 598, verses: 8 },
            { id: 99, name_en: "Az-Zalzalah", name_ar: "الزلزلة", page: 599, verses: 8 },
            { id: 100, name_en: "Al-'Adiyat", name_ar: "العاديات", page: 599, verses: 11 },
            { id: 101, name_en: "Al-Qari'ah", name_ar: "القارعة", page: 600, verses: 11 },
            { id: 102, name_en: "At-Takathur", name_ar: "التكاثر", page: 600, verses: 8 },
            { id: 103, name_en: "Al-'Asr", name_ar: "العصر", page: 601, verses: 3 },
            { id: 104, name_en: "Al-Humazah", name_ar: "الهمزة", page: 601, verses: 9 },
            { id: 105, name_en: "Al-Fil", name_ar: "الفيل", page: 601, verses: 5 },
            { id: 106, name_en: "Quraysh", name_ar: "قريش", page: 602, verses: 4 },
            { id: 107, name_en: "Al-Ma'un", name_ar: "الماعون", page: 602, verses: 7 },
            { id: 108, name_en: "Al-Kawthar", name_ar: "الكوثر", page: 602, verses: 3 },
            { id: 109, name_en: "Al-Kafirun", name_ar: "الكافرون", page: 603, verses: 6 },
            { id: 110, name_en: "An-Nasr", name_ar: "النصر", page: 603, verses: 3 },
            { id: 111, name_en: "Al-Masad", name_ar: "المسد", page: 603, verses: 5 },
            { id: 112, name_en: "Al-Ikhlas", name_ar: "الإخلاص", page: 604, verses: 4 },
            { id: 113, name_en: "Al-Falaq", name_ar: "الفلق", page: 604, verses: 5 },
            { id: 114, name_en: "An-Nas", name_ar: "الناس", page: 604, verses: 6 },
        ];

        // Juz start pages (approximate Medina Mushaf)
        const JUZ_PAGES = [1, 22, 42, 62, 82, 102, 121, 142, 162, 182, 201, 221, 241, 261, 281, 301, 321, 341, 361, 381, 401, 421, 441, 461, 481, 501, 521, 542, 562, 582];

        function getJuzForPage(p) {
            let juz = 1;
            for (let i = 0; i < JUZ_PAGES.length; i++) { if (p >= JUZ_PAGES[i]) juz = i + 1; else break; }
            return juz;
        }

        function getSurahForPage(p) {
            let found = SURAH_META[0];
            for (const s of SURAH_META) { if (s.page <= p) found = s; else break; }
            return found;
        }

        // ── STATE ──
        let currentPage = Number(localStorage.getItem("mushafPage") || 1);
        const TOTAL_PAGES = 604;

        // Cache: page number → {right: html, left: html}
        const pageCache = {};

        // ── CDN: quran.com image API for Medina Mushaf page images ──
        // Uses qurancdn which hosts all 604 page images
        function pageImageUrl(pageNum) {
            const p = String(pageNum).padStart(3, "0");
            return `https://verses.quran.com/Uthmani/pages/page${p}.png`;
        }

        // ── RENDER TWO-PAGE SPREAD ──
        async function renderSpread(pageNum) {
            pageNum = Math.max(1, Math.min(TOTAL_PAGES, pageNum));
            currentPage = pageNum;
            localStorage.setItem("mushafPage", pageNum);

            // In Medina Mushaf: page 1 is alone (Fatiha), then even/odd pairs
            // Right page = current, Left page = current+1 (Arabic reads right to left)
            const rightP = pageNum;
            const leftP = pageNum < TOTAL_PAGES ? pageNum + 1 : null;

            updateUI(pageNum);
            await Promise.all([
                renderPage("right", rightP),
                leftP ? renderPage("left", leftP) : renderPageEmpty("left"),
            ]);
        }

        async function renderPage(side, pageNum) {
            const inner = document.getElementById(`${side}-inner`);
            const loading = document.getElementById(`${side}-loading`);

            loading.style.display = "flex";
            inner.style.display = "none";

            const surah = getSurahForPage(pageNum);
            const juz = getJuzForPage(pageNum);

            // Build content using qurancdn page image — authentic Medina Mushaf typography
            inner.innerHTML = `
    <div class="page-header">
      <span class="page-header-surah">${surah.name_en}</span>
      <span class="page-header-juz">Juz ${juz}</span>
      <span class="page-header-num">Page ${pageNum}</span>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <img
        src="${pageImageUrl(pageNum)}"
        alt="Quran page ${pageNum}"
        style="max-width:100%;max-height:100%;object-fit:contain;display:block;"
        onerror="this.parentElement.innerHTML='<div style=\'text-align:center;color:var(--accent);font-family:Amiri,serif;padding:1rem\'>Could not load page image.<br>Check internet connection.</div>'"
      >
    </div>
    <div class="page-footer">
      <div class="page-num-diamond"><span>${pageNum}</span></div>
    </div>`;

            loading.style.display = "none";
            inner.style.display = "flex";
        }

        function renderPageEmpty(side) {
            const inner = document.getElementById(`${side}-inner`);
            const loading = document.getElementById(`${side}-loading`);
            loading.style.display = "none";
            inner.style.display = "flex";
            inner.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--accent);font-family:'Amiri',serif;font-size:1.2rem;">ختم القرآن الكريم</div>
    <div class="page-footer"><div class="page-num-diamond"><span>—</span></div></div>`;
        }

        function updateUI(pageNum) {
            const surah = getSurahForPage(pageNum);
            document.getElementById("page-label").textContent = `Page ${pageNum} / ${TOTAL_PAGES}`;
            document.getElementById("surah-label").textContent = `${surah.name_en} · Juz ${getJuzForPage(pageNum)}`;
            document.getElementById("page-jump").value = pageNum;
            document.getElementById("btn-prev").disabled = pageNum <= 1;
            document.getElementById("btn-first").disabled = pageNum <= 1;
            document.getElementById("btn-next").disabled = pageNum >= TOTAL_PAGES;
            document.getElementById("btn-last").disabled = pageNum >= TOTAL_PAGES;
        }

        // ── NAVIGATION ──
        document.getElementById("btn-prev").addEventListener("click", () => renderSpread(currentPage - 2));
        document.getElementById("btn-next").addEventListener("click", () => renderSpread(currentPage + 2));
        document.getElementById("btn-first").addEventListener("click", () => renderSpread(1));
        document.getElementById("btn-last").addEventListener("click", () => renderSpread(603));

        document.getElementById("page-jump").addEventListener("change", e => {
            const v = parseInt(e.target.value);
            if (v >= 1 && v <= TOTAL_PAGES) renderSpread(v % 2 === 0 ? v - 1 : v);
        });

        // Keyboard nav
        document.addEventListener("keydown", e => {
            if (e.target.tagName === "INPUT") return;
            if (e.key === "ArrowRight" || e.key === "ArrowUp") renderSpread(currentPage - 2);
            if (e.key === "ArrowLeft" || e.key === "ArrowDown") renderSpread(currentPage + 2);
            if (e.key === "Home") renderSpread(1);
            if (e.key === "End") renderSpread(603);
        });

        // ── SURAH PANEL ──
        function buildPanel(filter = "") {
            const list = document.getElementById("panel-list");
            const q = filter.toLowerCase();
            const items = SURAH_META.filter(s =>
                !q || s.name_en.toLowerCase().includes(q) || String(s.id) === q
            );
            list.innerHTML = items.map(s => `
    <div class="panel-surah-row" data-page="${s.page}">
      <div class="panel-surah-num">${s.id}</div>
      <div class="panel-surah-name">
        <div class="panel-surah-name-en">${s.name_en}</div>
        <div class="panel-surah-name-ar">${s.name_ar}</div>
      </div>
      <div class="panel-surah-page">p.${s.page}</div>
    </div>`).join("");

            list.querySelectorAll(".panel-surah-row").forEach(row => {
                row.addEventListener("click", () => {
                    const p = Number(row.dataset.page);
                    renderSpread(p % 2 === 0 ? p - 1 : p);
                    document.getElementById("side-panel").classList.remove("open");
                });
            });
        }

        document.getElementById("btn-surah-list").addEventListener("click", () => {
            document.getElementById("side-panel").classList.toggle("open");
        });
        document.getElementById("panel-close").addEventListener("click", () => {
            document.getElementById("side-panel").classList.remove("open");
        });
        document.getElementById("panel-search").addEventListener("input", e => buildPanel(e.target.value));
        buildPanel();

        // ── INIT ──
        // Start on odd page
        const startPage = currentPage % 2 === 0 ? currentPage - 1 : currentPage;
        renderSpread(startPage);
    </script>
</body>
