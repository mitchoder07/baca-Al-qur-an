<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quran Word Game — Al Furqan</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --primary-dim: rgba(16, 185, 129, 0.12);
            --dark: #0f172a;
            --dark-mid: #1e293b;
            --dark-light: #263247;
            --white: #fff;
            --text: #cbd5e1;
            --subtext: #64748b;
            --border: rgba(255, 255, 255, 0.07);
            --correct: #10b981;
            --wrong: #ef4444;
            --warn: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: "Poppins", sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* ── LIGHT MODE ── */
        body.light-mode {
            --dark: #f8fafc;
            --dark-mid: #ffffff;
            --dark-light: #f1f5f9;
            --white: #0f172a;
            --text: #475569;
            --subtext: #64748b;
            --border: rgba(0, 0, 0, 0.08);
            background: #f1f5f9;
            color: #0f172a
        }

        body.light-mode .navbar {
            background: rgba(248, 250, 252, 0.96);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08)
        }

        body.light-mode .nav-back {
            color: #475569;
            border-color: rgba(0, 0, 0, 0.1)
        }

        body.light-mode .nav-back:hover {
            color: var(--primary);
            border-color: var(--primary)
        }

        body.light-mode .game-card {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.07)
        }

        body.light-mode .word-arabic {
            color: #0f172a
        }

        body.light-mode .stat-pill {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.08)
        }

        body.light-mode .option-btn {
            background: rgba(0, 0, 0, 0.02);
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a
        }

        body.light-mode .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-dim)
        }

        body.light-mode .btn-skip {
            background: rgba(0, 0, 0, 0.06);
            color: #475569
        }

        body.light-mode .result-stat {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.07)
        }

        body.light-mode .diff-btn {
            color: #64748b;
            border-color: rgba(0, 0, 0, 0.1)
        }

        body.light-mode .progress-wrap {
            background: rgba(0, 0, 0, 0.07)
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: .9rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.92);
            border-bottom: 1px solid var(--border);
            z-index: 100
        }

        .topbar-logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .topbar-logo:hover {
            transform: scale(1.03);
        }

        .baca-logo-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.25));
        }

        .topbar-logo:hover .baca-logo-icon {
            filter: drop-shadow(0 3px 8px rgba(16, 185, 129, 0.4));
        }

        .topbar-logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, #10b981, #06b6d4, #6366f1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: "Poppins", sans-serif;
        }

        body.light-mode .topbar-logo-text {
            background: linear-gradient(135deg, #059669, #0891b2, #4f46e5);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: .4rem;
            color: var(--text);
            text-decoration: none;
            font-size: .85rem;
            font-weight: 500;
            padding: .45rem .9rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: .2s
        }

        .nav-back:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        .game-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5.5rem 1.5rem 3rem;
            max-width: 720px;
            margin: auto;
            width: 100%
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
            width: 100%
        }

        .game-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: .3rem
        }

        .game-title span {
            color: var(--primary)
        }

        .game-subtitle {
            color: var(--subtext);
            font-size: .88rem
        }

        .stats-bar {
            display: flex;
            gap: .7rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap
        }

        .stat-pill {
            display: flex;
            align-items: center;
            gap: .45rem;
            padding: .45rem 1rem;
            border-radius: 999px;
            background: var(--dark-mid);
            border: 1px solid var(--border);
            font-size: .8rem;
            font-weight: 600
        }

        .stat-pill.correct {
            border-color: rgba(16, 185, 129, .35);
            color: var(--correct)
        }

        .stat-pill.wrong {
            border-color: rgba(239, 68, 68, .35);
            color: var(--wrong)
        }

        .stat-pill.streak {
            border-color: rgba(245, 158, 11, .35);
            color: var(--warn)
        }

        .stat-pill.level {
            border-color: rgba(139, 92, 246, .35);
            color: #a78bfa
        }

        .progress-wrap {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 99px;
            margin-bottom: 1.8rem;
            overflow: hidden
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #34d399);
            border-radius: 99px;
            transition: width .5s ease
        }

        .game-card {
            width: 100%;
            background: var(--dark-mid);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            margin-bottom: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: border-color .3s
        }

        .game-card.correct-card {
            border-color: var(--correct);
            box-shadow: 0 0 30px rgba(16, 185, 129, .15)
        }

        .game-card.wrong-card {
            border-color: var(--wrong);
            box-shadow: 0 0 30px rgba(239, 68, 68, .12)
        }

        .word-arabic {
            font-family: "Amiri", serif;
            font-size: 4.5rem;
            line-height: 1.4;
            color: var(--white);
            direction: rtl;
            margin-bottom: .4rem
        }

        .word-translit {
            font-size: .9rem;
            color: var(--primary);
            font-style: italic;
            margin-bottom: .3rem
        }

        .word-location {
            font-size: .75rem;
            color: var(--subtext)
        }

        .hint-btn {
            margin-top: .9rem;
            border: none;
            background: rgba(245, 158, 11, .1);
            color: var(--warn);
            padding: .4rem .9rem;
            border-radius: 999px;
            cursor: pointer;
            font-size: .78rem;
            font-weight: 600;
            font-family: inherit;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: .35rem
        }

        .hint-btn:hover {
            background: rgba(245, 158, 11, .2)
        }

        .hint-text {
            font-size: .82rem;
            color: var(--warn);
            margin-top: .6rem;
            min-height: 1.2em
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .85rem;
            width: 100%;
            margin-bottom: 1.3rem
        }

        .option-btn {
            padding: 1.1rem 1rem;
            border-radius: 18px;
            border: 1.5px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--white);
            font-family: inherit;
            font-size: .93rem;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
            text-align: center;
            line-height: 1.4
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary);
            background: var(--primary-dim);
            transform: translateY(-2px)
        }

        .option-btn.selected {
            border-color: var(--primary);
            background: var(--primary-dim)
        }

        .option-btn.correct-ans {
            border-color: var(--correct);
            background: rgba(16, 185, 129, .18);
            color: var(--correct)
        }

        .option-btn.wrong-ans {
            border-color: var(--wrong);
            background: rgba(239, 68, 68, .15);
            color: var(--wrong)
        }

        .option-btn:disabled {
            cursor: default
        }

        .bottom-row {
            display: flex;
            gap: .8rem;
            width: 100%;
            justify-content: center
        }

        .action-btn {
            padding: .9rem 2rem;
            border-radius: 14px;
            border: none;
            font-family: inherit;
            font-size: .9rem;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .5rem
        }

        .btn-confirm {
            background: var(--primary);
            color: #fff;
            flex: 1;
            max-width: 220px
        }

        .btn-confirm:disabled {
            opacity: .35;
            cursor: default
        }

        .btn-skip {
            background: rgba(255, 255, 255, .07);
            color: var(--text);
            padding: .9rem 1.4rem
        }

        .btn-skip:hover {
            background: rgba(255, 255, 255, .12)
        }

        .feedback-toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            padding: .7rem 1.4rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: .9rem;
            opacity: 0;
            pointer-events: none;
            transition: .25s;
            z-index: 200;
            white-space: nowrap
        }

        .feedback-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .feedback-toast.correct {
            background: rgba(16, 185, 129, .9);
            color: #fff
        }

        .feedback-toast.wrong {
            background: rgba(239, 68, 68, .9);
            color: #fff
        }

        .result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%
        }

        .result-screen.show {
            display: flex
        }

        .result-emoji {
            font-size: 4rem;
            margin-bottom: 1rem
        }

        .result-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: .5rem
        }

        .result-score {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 2rem
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            width: 100%;
            margin-bottom: 2rem
        }

        .result-stat {
            background: var(--dark-mid);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 1.2rem
        }

        .result-stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary)
        }

        .result-stat-label {
            font-size: .75rem;
            color: var(--subtext);
            margin-top: .2rem
        }

        .btn-restart {
            background: var(--primary);
            color: #fff;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            border: none;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: .2s;
            display: inline-flex;
            align-items: center;
            gap: .6rem
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, .35)
        }

        .diff-row {
            display: flex;
            gap: .6rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap
        }

        .diff-btn {
            padding: .4rem 1rem;
            border-radius: 999px;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--subtext);
            font-family: inherit;
            font-size: .78rem;
            font-weight: 600;
            cursor: pointer;
            transition: .2s
        }

        .diff-btn.active {
            border-color: var(--primary);
            background: var(--primary-dim);
            color: var(--primary)
        }

        @media(max-width:480px) {
            .options-grid {
                grid-template-columns: 1fr
            }

            .result-grid {
                grid-template-columns: 1fr 1fr
            }

            .word-arabic {
                font-size: 3.2rem
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
         BACA — QURAN WORD QUIZ (game.html)
         ============================================================
         PAGE OUTLINE
         ------------------------------------------------------------
         1. Navbar (logo; shared-nav.js injects the floating
            hamburger into .nav-actions)
         2. Game wrap: title, difficulty selector (Easy/Medium/Hard),
            stats bar (correct/wrong/streak/level), progress bar
         3. Game area: word card (Arabic + transliteration + location
            + hint), multiple-choice options grid, skip/confirm buttons
         4. Result screen (shown after a round: score + best streak)
         5. Feedback toast
         6. Script: light-mode sync, WORD_BANK data (105 words tagged
            by conceptual difficulty, not letter count), quiz logic
         ============================================================ -->

    <header class="navbar">
        <a href="index.html" class="topbar-logo" aria-label="Baca — Home">
            <svg class="baca-logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true">
                <!-- Open book (Quran) silhouette -->
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z"
                    fill="url(#bacaLogoGrad)" opacity="0.18" />
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z"
                    stroke="url(#bacaLogoGrad)" stroke-width="1.8" stroke-linejoin="round" />
                <!-- Center spine -->
                <line x1="24" y1="14" x2="24" y2="38" stroke="url(#bacaLogoGrad)" stroke-width="1.5"
                    stroke-linecap="round" />
                <!-- Decorative star/crescent above book -->
                <path d="M24 4L25.5 8.5L30 9L26.5 12L28 16.5L24 14L20 16.5L21.5 12L18 9L22.5 8.5L24 4Z"
                    fill="url(#bacaLogoGrad)" opacity="0.9" />
                <!-- Page lines (left) -->
                <line x1="12" y1="18" x2="20" y2="17" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <line x1="12" y1="22" x2="20" y2="21" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <line x1="12" y1="26" x2="20" y2="25" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <!-- Page lines (right) -->
                <line x1="28" y1="17" x2="36" y2="18" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <line x1="28" y1="21" x2="36" y2="22" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <line x1="28" y1="25" x2="36" y2="26" stroke="url(#bacaLogoGrad)" stroke-width="1" opacity="0.5"
                    stroke-linecap="round" />
                <defs>
                    <linearGradient id="bacaLogoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#10b981" />
                        <stop offset="0.5" stop-color="#06b6d4" />
                        <stop offset="1" stop-color="#6366f1" />
                    </linearGradient>
                </defs>
            </svg>
            <span class="topbar-logo-text">Baca</span>
        </a>
        <div class="nav-actions" style="display:flex;align-items:center;gap:0.6rem;margin-left:auto;">
            <!-- The shared hamburger button is injected here by js/shared-nav.js -->
        </div>
    </header>

    <div class="game-wrap">
        <div class="game-header">
            <h1 class="game-title">Quran <span>Word Quiz</span></h1>
            <p class="game-subtitle">Learn the meaning of Quranic words — one verse at a time</p>
        </div>

        <div class="diff-row" id="diff-row">
            <button class="diff-btn active" data-diff="1">🌱 Easy</button>
            <button class="diff-btn" data-diff="2">🔥 Medium</button>
            <button class="diff-btn" data-diff="3">⚡ Hard</button>
        </div>

        <div class="stats-bar">
            <div class="stat-pill correct">✓ Correct: <span id="stat-correct">0</span></div>
            <div class="stat-pill wrong">✗ Wrong: <span id="stat-wrong">0</span></div>
            <div class="stat-pill streak">🔥 Streak: <span id="stat-streak">0</span></div>
            <div class="stat-pill level">⭐ Level: <span id="stat-level">Easy</span></div>
        </div>

        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>

        <div id="game-area" style="width:100%">
            <div class="game-card" id="game-card">
                <div class="word-arabic" id="word-arabic">—</div>
                <div class="word-translit" id="word-translit"></div>
                <div class="word-location" id="word-location"></div>
                <button class="hint-btn" id="hint-btn"><i class="fa-solid fa-lightbulb"></i> Show Hint</button>
                <div class="hint-text" id="hint-text"></div>
            </div>
            <div class="options-grid" id="options-grid"></div>
            <div class="bottom-row">
                <button class="action-btn btn-skip" id="btn-skip">Skip <i class="fa-solid fa-arrow-right"></i></button>
                <button class="action-btn btn-confirm" id="btn-confirm" disabled>Confirm</button>
            </div>
        </div>

        <div class="result-screen" id="result-screen">
            <div class="result-emoji" id="result-emoji">🎉</div>
            <h2 class="result-title" id="result-title">Round Complete!</h2>
            <p class="result-score" id="result-score"></p>
            <div class="result-grid">
                <div class="result-stat">
                    <div class="result-stat-num" id="res-correct">0</div>
                    <div class="result-stat-label">Correct</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" id="res-wrong">0</div>
                    <div class="result-stat-label">Wrong</div>
                </div>
                <div class="result-stat">
                    <div class="result-stat-num" id="res-best">0</div>
                    <div class="result-stat-label">Best Streak</div>
                </div>
            </div>
            <button class="btn-restart" id="btn-restart"><i class="fa-solid fa-rotate-right"></i> Play Again</button>
        </div>
    </div>

    <div class="feedback-toast" id="feedback-toast"></div>

    <script>
        // ── LIGHT MODE SYNC — reads site-wide preference from localStorage ──
        if (localStorage.getItem("siteTheme") === "light") document.body.classList.add("light-mode");

        // ═══════════════════════════════════════════════════════════════
        // WORD BANK — 105 words, manually tagged by conceptual difficulty
        // (NOT letter count — Islamic vocabulary difficulty doesn't
        //  correlate with Arabic letter count as we found)
        //
        // diff 1 = Easy:   everyday Arabic words most beginners know
        // diff 2 = Medium: Islamic terms a regular Muslim would know
        // diff 3 = Hard:   specific scholarly/theological terms
        // ═══════════════════════════════════════════════════════════════
        const WORD_BANK = [
            // ── EASY ─────────────────────────────────────────────────────
            { arabic: "اللَّهُ", translit: "Allahu", meaning: "Allah (God)", surah: 1, ayah: 1, diff: 1, hint: "The name of God in Arabic" },
            { arabic: "رَبِّ", translit: "Rabbi", meaning: "Lord / My Lord", surah: 1, ayah: 2, diff: 1, hint: "Used in du'a: 'Rabbi zidni...'" },
            { arabic: "قُلْ", translit: "Qul", meaning: "Say", surah: 112, ayah: 1, diff: 1, hint: "Command given to the Prophet ﷺ" },
            { arabic: "نُورٌ", translit: "Noor", meaning: "Light", surah: 24, ayah: 35, diff: 1, hint: "Allah is the light of the heavens" },
            { arabic: "مَاءٌ", translit: "Ma'", meaning: "Water", surah: 21, ayah: 30, diff: 1, hint: "Every living thing was made from it" },
            { arabic: "قَلْبٌ", translit: "Qalb", meaning: "Heart", surah: 2, ayah: 7, diff: 1, hint: "The seat of faith in Islam" },
            { arabic: "نَارٌ", translit: "Naar", meaning: "Fire / Hellfire", surah: 2, ayah: 24, diff: 1, hint: "Place of punishment in the Quran" },
            { arabic: "أَحَدٌ", translit: "Ahad", meaning: "One / Unique", surah: 112, ayah: 1, diff: 1, hint: "Used in Surah Al-Ikhlas" },
            { arabic: "سَمَاءٌ", translit: "Sama'", meaning: "Sky / Heaven", surah: 13, ayah: 2, diff: 1, hint: "Allah raised it without pillars" },
            { arabic: "أَرْضٌ", translit: "Ard", meaning: "Earth / Land", surah: 2, ayah: 22, diff: 1, hint: "Allah spread it out for mankind" },
            { arabic: "كِتَابٌ", translit: "Kitaab", meaning: "Book", surah: 2, ayah: 2, diff: 1, hint: "Al-Kitab = The Book (Quran)" },
            { arabic: "هُدًى", translit: "Hudan", meaning: "Guidance", surah: 2, ayah: 2, diff: 1, hint: "The Quran is hudal lil-muttaqeen" },

            { arabic: "الْمُتَطَهِّرِينَ", translit: "Al-Mutatahhireen", meaning: "Those who purify themselves", surah: 2, ayah: 222, diff: 3, hint: null },
            { arabic: "الْمُسْتَضْعَفِينَ", translit: "Al-Mustad'afeen", meaning: "Those who are oppressed", surah: 4, ayah: 75, diff: 3, hint: null },
            { arabic: "اسْتِئْذَانٌ", translit: "Isti'dhan", meaning: "Seeking permission", surah: 24, ayah: 27, diff: 3, hint: null },
            { arabic: "الْمُتَكَبِّرُ", translit: "Al-Mutakabbir", meaning: "The Supremely Great", surah: 59, ayah: 23, diff: 3, hint: null },
            { arabic: "اسْتِسْلَامٌ", translit: "Istislam", meaning: "Complete submission", surah: 37, ayah: 26, diff: 3, hint: null },
            { arabic: "مُسْتَقَرٌّ", translit: "Mustaqarr", meaning: "A place of settlement", surah: 6, ayah: 98, diff: 3, hint: null },
            { arabic: "الْمُسْتَهْزِئِينَ", translit: "Al-Mustahzi'een", meaning: "The mockers", surah: 15, ayah: 95, diff: 3, hint: null },
            { arabic: "الْمُصْلِحُونَ", translit: "Al-Muslihoon", meaning: "Those who reform / do good", surah: 2, ayah: 11, diff: 3, hint: null },
        ];

        const ALL_MEANINGS = [...new Set(WORD_BANK.map(w => w.meaning))];

        function shuffle(arr) { return [...arr].sort(() => Math.random() - .5); }
        function randFrom(arr) { if (!arr || !arr.length) return null; return arr[Math.floor(Math.random() * arr.length)]; }

        // ── STATE ──
        let difficulty = 1;
        let score = { correct: 0, wrong: 0, streak: 0, bestStreak: 0 };
        let questionNum = 0;
        const ROUND_LEN = 10;
        let currentWord = null, correctAnswer = "", selected = null, hintUsed = false, answered = false;

        // Cross-round session memory so words don't repeat across games
        let seenWords = JSON.parse(sessionStorage.getItem("seenWords") || "[]");

        const LEVEL_NAMES = { 1: "Easy", 2: "Medium", 3: "Hard" };

        // ── DIFFICULTY — data-diff="1"/"2"/"3" so Number() works correctly ──
        document.querySelectorAll(".diff-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".diff-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                difficulty = Number(btn.dataset.diff);
                startRound();
            });
        });

        function nextQuestion() {
            if (questionNum >= ROUND_LEN) { showResult(); return; }
            hintUsed = false; answered = false; selected = null;
            document.getElementById("hint-text").textContent = "";
            document.getElementById("game-card").className = "game-card";
            document.getElementById("btn-confirm").disabled = true;

            // Hard mode: no hints at all
            const hintBtn = document.getElementById("hint-btn");
            hintBtn.style.display = difficulty === 3 ? "none" : "inline-flex";
            if (difficulty !== 3) hintBtn.disabled = false;

            // Build pool by exact difficulty
            let pool = WORD_BANK.filter(w => w.diff === difficulty);
            if (!pool.length) pool = [...WORD_BANK];

            // Prefer unseen words
            let fresh = pool.filter(w => !seenWords.includes(w.arabic));
            if (!fresh.length) {
                // Reset only seen words from this difficulty pool
                seenWords = seenWords.filter(a => !pool.some(w => w.arabic === a));
                fresh = pool;
            }
            // Avoid immediate repeat
            if (fresh.length > 1 && currentWord) fresh = fresh.filter(w => w.arabic !== currentWord.arabic);

            currentWord = randFrom(fresh.length ? fresh : pool);
            if (!currentWord) { showResult(); return; }
            correctAnswer = currentWord.meaning;

            seenWords.push(currentWord.arabic);
            if (seenWords.length > 80) seenWords = seenWords.slice(-80);
            sessionStorage.setItem("seenWords", JSON.stringify(seenWords));

            document.getElementById("word-arabic").textContent = currentWord.arabic;
            document.getElementById("word-translit").textContent = currentWord.translit;
            document.getElementById("word-location").textContent = `Surah ${currentWord.surah}, Ayah ${currentWord.ayah}`;

            const wrongs = shuffle(ALL_MEANINGS.filter(m => m !== correctAnswer)).slice(0, 3);
            const options = shuffle([correctAnswer, ...wrongs]);
            const grid = document.getElementById("options-grid");
            grid.innerHTML = options.map(opt => `<button class="option-btn" data-val="${opt.replace(/"/g, '&quot;')}">${opt}</button>`).join("");
            grid.querySelectorAll(".option-btn").forEach(btn => btn.addEventListener("click", () => selectOption(btn)));

            updateProgress(); updateStats();
        }

        function selectOption(btn) {
            if (answered) return;
            document.querySelectorAll(".option-btn").forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected"); selected = btn.dataset.val;
            document.getElementById("btn-confirm").disabled = false;
        }

        function confirmAnswer() {
            if (!selected || answered) return;
            answered = true; questionNum++;
            document.getElementById("btn-confirm").disabled = true;
            const isCorrect = selected === correctAnswer;
            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.disabled = true;
                if (btn.dataset.val === correctAnswer) btn.classList.add("correct-ans");
                else if (btn.dataset.val === selected) btn.classList.add("wrong-ans");
            });
            document.getElementById("game-card").classList.add(isCorrect ? "correct-card" : "wrong-card");
            if (isCorrect) {
                score.correct++; score.streak++;
                if (score.streak > score.bestStreak) score.bestStreak = score.streak;
                const pts = hintUsed ? 1 : (difficulty === 3 ? 3 : difficulty === 2 ? 2 : 1);
                showToast(`✓ Correct! +${pts}`, "correct");
            } else {
                score.wrong++; score.streak = 0;
                showToast(`✗ It was: "${correctAnswer}"`, "wrong");
            }
            updateStats();
            setTimeout(nextQuestion, 1600);
        }

        document.getElementById("hint-btn").addEventListener("click", () => {
            if (difficulty === 3 || !currentWord?.hint) return;
            hintUsed = true;
            document.getElementById("hint-text").textContent = "💡 " + currentWord.hint;
            document.getElementById("hint-btn").disabled = true;
        });

        document.getElementById("btn-skip").addEventListener("click", () => {
            if (answered) return;
            answered = true; questionNum++; score.streak = 0; updateStats();
            showToast("Skipped →", "wrong");
            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.disabled = true;
                if (btn.dataset.val === correctAnswer) btn.classList.add("correct-ans");
            });
            setTimeout(nextQuestion, 1400);
        });

        document.getElementById("btn-confirm").addEventListener("click", confirmAnswer);

        function showResult() {
            document.getElementById("game-area").style.display = "none";
            document.getElementById("result-screen").classList.add("show");
            const pct = Math.round((score.correct / ROUND_LEN) * 100);
            const emoji = pct >= 80 ? "🏆" : pct >= 60 ? "🌟" : pct >= 40 ? "👍" : "📖";
            const title = pct >= 80 ? "Excellent!" : pct >= 60 ? "Well Done!" : pct >= 40 ? "Good Effort" : "Keep Learning!";
            document.getElementById("result-emoji").textContent = emoji;
            document.getElementById("result-title").textContent = title;
            document.getElementById("result-score").textContent = `You scored ${pct}% — ${score.correct} correct out of ${ROUND_LEN} words`;
            document.getElementById("res-correct").textContent = score.correct;
            document.getElementById("res-wrong").textContent = score.wrong;
            document.getElementById("res-best").textContent = score.bestStreak;
        }

        document.getElementById("btn-restart").addEventListener("click", startRound);

        function updateStats() {
            document.getElementById("stat-correct").textContent = score.correct;
            document.getElementById("stat-wrong").textContent = score.wrong;
            document.getElementById("stat-streak").textContent = score.streak;
            document.getElementById("stat-level").textContent = LEVEL_NAMES[difficulty] || "Easy";
        }
        function updateProgress() { document.getElementById("progress-fill").style.width = (questionNum / ROUND_LEN * 100) + "%"; }
        function showToast(msg, type) {
            const el = document.getElementById("feedback-toast");
            el.textContent = msg; el.className = `feedback-toast ${type} show`;
            setTimeout(() => el.classList.remove("show"), 1400);
        }
        function startRound() {
            score = { correct: 0, wrong: 0, streak: 0, bestStreak: 0 };
            questionNum = 0;
            document.getElementById("game-area").style.display = "block";
            document.getElementById("result-screen").classList.remove("show");
            updateStats(); updateProgress(); nextQuestion();
        }

        startRound();
    </script>
