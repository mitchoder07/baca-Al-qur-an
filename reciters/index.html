<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reciters — Baca</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Shared nav styles (auto-injected by shared-nav.js, but we link it here too for safety) -->
    <link rel="stylesheet" href="../css/shared-nav.css">

    <style>
        :root {
            --primary: #10b981;
            --primary-dim: rgba(16, 185, 129, 0.12);
            --dark: #0f172a;
            --dark-mid: #1e293b;
            --dark-light: #263247;
            --white: #ffffff;
            --text: #cbd5e1;
            --subtext: #64748b;
            --border: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: "Poppins", sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
        }

        /* ── GLOW BACKGROUND (matches main site) ── */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.18;
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.glow-1 { top: -120px; left: -120px; width: 400px; height: 400px; background: #10b981; }
        .bg-glow.glow-2 { top: 30%; right: -150px; width: 500px; height: 500px; background: #06b6d4; }
        .bg-glow.glow-3 { bottom: -120px; left: 30%; width: 400px; height: 400px; background: #6366f1; }

        /* ── NAVBAR ── */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .logo:hover { transform: scale(1.03); }
        .logo .baca-logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
        .logo .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 50%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: .5rem;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            padding: .5rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: .2s;
            margin-right: 4.2rem; /* leave room for the floating shared-nav FAB */
        }
        .nav-back:hover { border-color: var(--primary); color: var(--primary); }

        /* ── HERO ── */
        .reciters-hero {
            padding: 8rem 8% 2rem;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .3rem .9rem;
            border-radius: 999px;
            background: var(--primary-dim);
            color: var(--primary);
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: .9rem;
        }
        .reciters-hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: .8rem;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .reciters-hero p {
            color: var(--text);
            font-size: 1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ── SEARCH ── */
        .reciters-search-wrap {
            max-width: 500px;
            margin: 2rem auto 2.5rem;
            position: relative;
            display: flex;
            align-items: center;
        }
        .reciters-search-wrap svg {
            position: absolute;
            left: 16px;
            width: 18px;
            height: 18px;
            color: #94a3b8;
            pointer-events: none;
        }
        .reciters-search-wrap input {
            width: 100%;
            height: 52px;
            padding-left: 48px;
            padding-right: 1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: border-color .2s;
        }
        .reciters-search-wrap input:focus { border-color: var(--primary); }
        .reciters-search-wrap input::placeholder { color: #64748b; }

        /* ── GRID + CARDS (mirror index.html styles) ── */
        .reciters-section {
            padding: 0 8% 6rem;
            position: relative;
            z-index: 1;
        }
        .reciters-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .reciter-card {
            background: var(--dark-light);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.8rem 1.2rem 1.4rem;
            text-align: center;
            cursor: pointer;
            transition: transform .25s, border-color .25s, box-shadow .25s;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .reciter-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 16px 40px rgba(16, 185, 129, 0.12);
        }
        .reciter-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--primary);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
        }
        .reciter-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .reciter-card h3 {
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: .3rem;
            line-height: 1.3;
        }
        .reciter-card .rc-country {
            font-size: .78rem;
            color: #94a3b8;
            margin-bottom: .5rem;
        }
        .reciter-card .rc-style {
            display: inline-block;
            padding: .22rem .7rem;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.12);
            color: var(--primary);
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        .reciters-empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }
        .reciters-empty i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: .8rem;
            display: block;
        }

        /* ── LIGHT MODE ── */
        body.light-mode { background: #f1f5f9; color: #0f172a; }
        body.light-mode .navbar { background: rgba(248, 250, 252, 0.97); border-bottom-color: rgba(0, 0, 0, 0.08); }
        body.light-mode .nav-back { color: #475569; border-color: rgba(0, 0, 0, 0.1); }
        body.light-mode .reciters-hero h1 {
            background: linear-gradient(135deg, #0f172a 0%, #475569 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        body.light-mode .reciters-hero p { color: #475569; }
        body.light-mode .reciters-search-wrap input {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }
        body.light-mode .reciter-card { background: #ffffff; border-color: rgba(0, 0, 0, 0.07); }
        body.light-mode .reciter-card:hover { border-color: var(--primary); }
        body.light-mode .reciter-card h3 { color: #0f172a; }
        body.light-mode .reciter-card .rc-country { color: #64748b; }
        body.light-mode .reciters-empty { color: #94a3b8; }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            .reciters-hero { padding: 7rem 6% 1.5rem; }
            .reciters-section { padding: 0 6% 4rem; }
            .reciters-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: .9rem; }
            .reciter-card { padding: 1.4rem 1rem 1.2rem; border-radius: 18px; }
            .reciter-avatar { width: 72px; height: 72px; }
        }
    </style>
</head>

<body>

    <!-- Glow background -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>

    <!-- Navbar (minimal — shared-nav.js adds the floating hamburger) -->
    <header class="navbar">
        <a href="../index.html" class="logo" style="text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;">
            <svg class="baca-logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z" fill="url(#bacaLogoGrad)" opacity="0.18"/>
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z" stroke="url(#bacaLogoGrad)" stroke-width="1.8" stroke-linejoin="round"/>
                <line x1="24" y1="14" x2="24" y2="38" stroke="url(#bacaLogoGrad)" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M24 4L25.5 8.5L30 9L26.5 12L28 16.5L24 14L20 16.5L21.5 12L18 9L22.5 8.5L24 4Z" fill="url(#bacaLogoGrad)" opacity="0.9"/>
                <defs>
                    <linearGradient id="bacaLogoGrad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
                        <stop offset="0" stop-color="#10b981"/>
                        <stop offset="0.5" stop-color="#06b6d4"/>
                        <stop offset="1" stop-color="#6366f1"/>
                    </linearGradient>
                </defs>
            </svg>
            <span class="logo-text">Baca</span>
        </a>
        <div class="nav-actions" style="display:flex;align-items:center;gap:0.6rem;margin-left:auto;">
            <!-- The shared hamburger button is injected here by js/shared-nav.js -->
        </div>
    </header>

    <!-- Hero -->
    <section class="reciters-hero">
        <span class="hero-badge">
            <i class="fa-solid fa-microphone"></i> 26 Reciters
        </span>
        <h1>Choose a Reciter</h1>
        <p>Listen to the entire Qur'an in the voice of world-renowned reciters. Tap any card to open their profile and play any surah.</p>
    </section>

    <!-- Reciters section -->
    <section class="reciters-section">
        <div class="reciters-search-wrap">
            <i data-lucide="search"></i>
            <input type="text" id="reciters-search" placeholder="Search by name, country, or style…">
        </div>
        <div class="reciters-grid" id="reciters-grid"></div>
    </section>

    <script>
        // Sync light mode with main site preference
        if (localStorage.getItem("siteTheme") === "light") {
            document.body.classList.add("light-mode");
        }

        // Reciter profiles (kept in sync with js/script.js RECITER_PROFILES)
        const RECITER_PROFILES = [
            { id: "mishari", name: "Mishary Alafasy", country: "Kuwait", style: "Murattal", image: "../images/reciters/mishary.png" },
            { id: "sudais", name: "Abdul Rahman As-Sudais", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/sudais.png" },
            { id: "ali_jaber", name: "Ali Abdullah Jabir", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/ali jabir.png" },
            { id: "abdulbasit", name: "Abdul Basit (Murattal)", country: "Egypt", style: "Murattal", image: "../images/reciters/basit.png" },
            { id: "abdulbasit_mj", name: "Abdul Basit (Mujawwad)", country: "Egypt", style: "Mujawwad", image: "../images/reciters/basit.png" },
            { id: "husary", name: "Mahmoud Al-Husary", country: "Egypt", style: "Murattal", image: "../images/reciters/al-husary.png" },
            { id: "husary_muj", name: "Al-Husary (Mujawwad)", country: "Egypt", style: "Mujawwad", image: "../images/reciters/al-husary.png" },
            { id: "minshawi", name: "Muhammad Al-Minshawi", country: "Egypt", style: "Murattal", image: "../images/reciters/minshawi.png" },
            { id: "shaatree", name: "Abu Bakr Ash-Shaatree", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/as-shateree.png" },
            { id: "muaiqly", name: "Maher Al-Muaiqly", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/maher.png" },
            { id: "shuraym", name: "Saud Al-Shuraim", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/shuraim.png" },
            { id: "hudhaify", name: "Ali Al-Hudhaify", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/al-hudaify.png" },
            { id: "ajamy", name: "Ahmed Al-Ajamy", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/al-ajmy.png" },
            { id: "jibreel", name: "Muhammad Jibreel", country: "Egypt", style: "Murattal", image: "../images/reciters/jibreel.png" },
            { id: "ayyoub", name: "Muhammad Ayyoub", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/ayyub.png" },
            { id: "ghamdi", name: "Saad Al-Ghamdi", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/saad_al-ghamdi.png" },
            { id: "basfar", name: "Abdullah Basfar", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/basfar.png" },
            { id: "matroud", name: "Abdullah Matroud", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/al-matrood.png" },
            { id: "juhaynee", name: "Abdullah Al-Juhaynee", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/al-juhani.png" },
            { id: "johany", name: "Abdullah Al-Johany", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/al-johany.png" },
            { id: "tablawi", name: "Mohamed Al-Tablawi", country: "Egypt", style: "Murattal", image: "../images/reciters/tablawi.png" },
            { id: "rifai", name: "Hani Ar-Rifai", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/Hani Ar-rifai.png" },
            { id: "qasim", name: "Abdul Muhsin Al-Qasim", country: "Saudi Arabia", style: "Murattal", image: "../images/reciters/muhsin.png" },
            { id: "neana", name: "Ahmed Neana", country: "Egypt", style: "Murattal", image: "../images/reciters/neana.png" },
            { id: "ayman_swed", name: "Ayman Swed", country: "Syria", style: "Murattal", image: "../images/reciters/ayman.png" },
            { id: "okasha", name: "Okasha Kameny", country: "Ghana", style: "Murattal", image: "../images/reciters/okasha.png" },
        ];

        function renderGrid(list) {
            const gridEl = document.getElementById("reciters-grid");
            if (!list.length) {
                gridEl.innerHTML = `<div class="reciters-empty"><i class="fa-solid fa-face-sad-tear"></i><p>No reciters match your search.</p></div>`;
                return;
            }
            gridEl.innerHTML = list.map(r => `
                <a class="reciter-card" href="reciter.html?r=${r.id}" title="Open ${r.name}'s profile">
                    <div class="reciter-avatar">
                        <img src="${r.image}" alt="${r.name}"
                            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                        <span style="display:none;width:100%;height:100%;align-items:center;justify-content:center">
                            <i data-lucide="mic"></i>
                        </span>
                    </div>
                    <h3>${r.name}</h3>
                    <div class="rc-country">${r.country}</div>
                    <span class="rc-style">${r.style}</span>
                </a>`).join("");
            if (window.lucide) lucide.createIcons();
        }

        renderGrid(RECITER_PROFILES);

        document.getElementById("reciters-search").addEventListener("input", e => {
            const q = e.target.value.trim().toLowerCase();
            renderGrid(q
                ? RECITER_PROFILES.filter(r =>
                    r.name.toLowerCase().includes(q) ||
                    r.country.toLowerCase().includes(q) ||
                    r.style.toLowerCase().includes(q))
                : RECITER_PROFILES
            );
        });

        if (window.lucide) lucide.createIcons();
    </script>

    <!-- Shared hamburger menu (floating button + slide-in drawer) -->
    <script src="../js/shared-nav.js"></script>

</body>

</html>
