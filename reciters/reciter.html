<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reciter Profile — Al Furqan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dim: rgba(16, 185, 129, 0.12);
            --dark: #0f172a;
            --dark-mid: #1e293b;
            --dark-light: #263247;
            --white: #ffffff;
            --text: #cbd5e1;
            --subtext: #64748b;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: "Poppins", sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh
        }

        /* NAV */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid var(--border);
            z-index: 1000
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .logo:hover {
            transform: scale(1.03);
        }

        .logo .baca-logo-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(16, 185, 129, 0.25));
        }

        .logo:hover .baca-logo-icon {
            filter: drop-shadow(0 3px 8px rgba(16, 185, 129, 0.4));
        }

        .logo .logo-text {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #06b6d4 50%, #6366f1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: .5rem;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            padding: .5rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: .2s
        }

        .nav-back:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        /* HERO */
        .reciter-hero {
            padding: 7rem 6% 2.5rem;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.04) 0%, transparent 60%);
            position: relative;
            overflow: hidden
        }

        .reciter-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16, 185, 129, 0.07), transparent);
            pointer-events: none
        }

        .hero-inner {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 190px 1fr;
            gap: 2.5rem;
            align-items: center
        }

        /* AVATAR */
        .avatar-wrap {
            position: relative;
            width: 190px;
            height: 190px;
            flex-shrink: 0
        }

        .avatar-ring {
            width: 190px;
            height: 190px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 4px;
            background: linear-gradient(135deg, rgba(16, 185, 129, .15), transparent)
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--dark-mid);
            display: block
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #1e293b, #263247);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--primary)
        }

        .online-dot {
            position: absolute;
            bottom: 14px;
            right: 14px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid var(--dark)
        }

        /* HERO INFO */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .3rem .9rem;
            border-radius: 999px;
            background: var(--primary-dim);
            color: var(--primary);
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: .9rem
        }

        .hero-name {
            font-size: 2.3rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: .3rem
        }

        .hero-name-arabic {
            font-family: "Amiri", serif;
            font-size: 1.5rem;
            color: var(--primary);
            direction: rtl;
            margin-bottom: .7rem;
            opacity: .85
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-bottom: 1.2rem
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .35rem .85rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: .8rem;
            font-weight: 500
        }

        .meta-pill i {
            color: var(--primary);
            font-size: .75rem
        }

        .hero-bio {
            color: var(--text);
            line-height: 1.85;
            font-size: .93rem;
            max-height: 4em;
            overflow: hidden;
            transition: max-height .4s ease
        }

        .hero-bio.expanded {
            max-height: 60em
        }

        .bio-toggle {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: .82rem;
            font-weight: 600;
            margin-top: .5rem;
            display: none;
            padding: 0;
            font-family: inherit
        }

        /* STATS */
        .stats-bar {
            max-width: 900px;
            margin: 1.8rem auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--dark-mid);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden
        }

        .stat-item {
            padding: 1.2rem;
            text-align: center;
            border-right: 1px solid var(--border)
        }

        .stat-item:last-child {
            border-right: none
        }

        .stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary)
        }

        .stat-label {
            font-size: .72rem;
            color: var(--subtext);
            margin-top: .2rem;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        /* STICKY PLAYER */
        .sticky-player {
            position: sticky;
            top: 65px;
            z-index: 500;
            background: rgba(15, 23, 42, 0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: .85rem 6%;
            display: none;
            align-items: center;
            gap: 1.2rem
        }

        .sticky-player.visible {
            display: flex
        }

        .sp-info {
            flex: 1;
            min-width: 0
        }

        .sp-surah {
            font-weight: 700;
            font-size: .9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .sp-reciter {
            font-size: .75rem;
            color: var(--subtext)
        }

        .sp-controls {
            display: flex;
            align-items: center;
            gap: .7rem
        }

        .sp-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.07);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s
        }

        .sp-btn:hover {
            background: var(--primary);
            transform: scale(1.05)
        }

        .sp-play {
            width: 48px !important;
            height: 48px !important;
            background: var(--primary) !important
        }

        .sp-progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: .7rem;
            min-width: 0
        }

        .sp-time {
            font-size: .75rem;
            color: var(--subtext);
            white-space: nowrap
        }

        .sp-progress {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            cursor: pointer;
            position: relative;
            min-width: 60px
        }

        .sp-progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
            width: 0%;
            pointer-events: none
        }

        /* SURAH SECTION */
        .surah-section {
            padding: 2rem 6% 5rem;
            max-width: 960px;
            margin: auto
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.3rem;
            display: flex;
            align-items: center;
            gap: .6rem
        }

        .section-title i {
            color: var(--primary)
        }

        /* SEARCH */
        .search-wrap {
            position: relative;
            margin-bottom: 1.4rem
        }

        .search-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--subtext);
            pointer-events: none
        }

        .surah-search-input {
            width: 100%;
            height: 52px;
            padding-left: 46px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: .2s
        }

        .surah-search-input:focus {
            border-color: var(--primary)
        }

        .surah-search-input::placeholder {
            color: var(--subtext)
        }

        /* SURAH ROWS */
        .surah-list {
            display: flex;
            flex-direction: column;
            gap: .45rem
        }

        .surah-row {
            display: grid;
            grid-template-columns: 52px 1fr auto auto;
            align-items: center;
            gap: 1rem;
            padding: .9rem 1.2rem;
            border-radius: 16px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.025);
            transition: .2s;
            cursor: pointer;
            user-select: none
        }

        .surah-row:hover {
            background: rgba(16, 185, 129, 0.07);
            border-color: rgba(16, 185, 129, 0.2);
            transform: translateX(3px)
        }

        .surah-row.playing {
            background: rgba(16, 185, 129, 0.11);
            border-color: rgba(16, 185, 129, 0.4)
        }

        .row-num {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .85rem;
            color: var(--subtext);
            transition: .2s;
            position: relative;
            flex-shrink: 0
        }

        .surah-row.playing .row-num,
        .surah-row:hover .row-num {
            background: var(--primary-dim);
            color: var(--primary)
        }

        .row-num-text {
            display: flex;
        }

        .row-play-icon {
            display: none;
            position: absolute;
            inset: 0;
            align-items: center;
            justify-content: center;
        }

        .surah-row:not(.playing):hover .row-num-text {
            display: none;
        }

        .surah-row:not(.playing):hover .row-play-icon.play-icon {
            display: flex;
        }

        .surah-row:not(.playing):hover .row-play-icon.pause-icon {
            display: none;
        }

        .surah-row.playing .row-num-text {
            display: none;
        }

        .surah-row.playing .row-play-icon.pause-icon {
            display: flex;
        }

        .surah-row.playing .row-play-icon.play-icon {
            display: none;
        }

        .surah-row.playing:hover .row-play-icon.play-icon {
            display: flex;
        }

        .surah-row.playing:hover .row-play-icon.pause-icon {
            display: none;
        }

        .row-name {
            font-weight: 600;
            font-size: .95rem;
            margin-bottom: .15rem
        }

        .row-meta {
            font-size: .78rem;
            color: var(--subtext)
        }

        .row-arabic {
            font-family: "Amiri", serif;
            font-size: 1.3rem;
            color: var(--text);
            direction: rtl;
            text-align: right;
            transition: .2s
        }

        .surah-row.playing .row-arabic {
            display: none
        }

        .row-duration {
            font-size: .78rem;
            color: var(--subtext);
            white-space: nowrap;
            min-width: 38px;
            text-align: right
        }

        /* WAVE */
        .wave-bars {
            display: none;
            align-items: flex-end;
            gap: 2px;
            height: 18px
        }

        .surah-row.playing .wave-bars {
            display: flex
        }

        .wave-bar {
            width: 3px;
            border-radius: 2px;
            background: var(--primary);
            animation: wave .8s ease-in-out infinite
        }

        .wave-bar:nth-child(2) {
            animation-delay: .12s
        }

        .wave-bar:nth-child(3) {
            animation-delay: .24s
        }

        .wave-bar:nth-child(4) {
            animation-delay: .36s
        }

        .wave-bar:nth-child(5) {
            animation-delay: .48s
        }

        @keyframes wave {

            0%,
            100% {
                height: 30%
            }

            50% {
                height: 100%
            }
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--subtext)
        }

        .no-results i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: .8rem;
            display: block
        }

        /* BACK TOP */
        .back-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(16, 185, 129, .3);
            z-index: 800;
            transition: .25s
        }

        .back-top.show {
            display: flex
        }

        .back-top:hover {
            transform: translateY(-3px)
        }

        /* ── LIGHT MODE ── */
        body.light-mode {
            background: #f1f5f9;
            color: #0f172a;
        }

        body.light-mode .navbar {
            background: rgba(248, 250, 252, 0.97);
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }

        body.light-mode .nav-logo {
            color: var(--primary);
        }

        body.light-mode .nav-back {
            color: #475569;
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .nav-back:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        body.light-mode .reciter-hero {
            background: linear-gradient(180deg, rgba(16, 185, 129, .03) 0%, transparent 60%);
        }

        body.light-mode .hero-name {
            color: #0f172a;
        }

        body.light-mode .hero-bio {
            color: #475569;
        }

        body.light-mode .meta-pill {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.08);
            color: #475569;
        }

        body.light-mode .stats-bar {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.07);
        }

        body.light-mode .stat-item {
            border-right-color: rgba(0, 0, 0, 0.07);
        }

        body.light-mode .stat-label {
            color: #94a3b8;
        }

        body.light-mode .sticky-player {
            background: rgba(248, 250, 252, 0.98);
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }

        body.light-mode .sp-surah {
            color: #0f172a;
        }

        body.light-mode .sp-reciter {
            color: #64748b;
        }

        body.light-mode .sp-btn {
            background: #e2e8f0;
            color: #0f172a;
        }

        body.light-mode .sp-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        body.light-mode .sp-progress {
            background: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .sp-time {
            color: #94a3b8;
        }

        body.light-mode .section-title {
            color: #0f172a;
        }

        body.light-mode .surah-search-input {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }

        body.light-mode .surah-search-input::placeholder {
            color: #94a3b8;
        }

        body.light-mode .surah-row {
            background: rgba(0, 0, 0, 0.02);
            border-color: transparent;
        }

        body.light-mode .surah-row:hover {
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.15);
        }

        body.light-mode .surah-row.playing {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }

        body.light-mode .row-num {
            background: rgba(0, 0, 0, 0.05);
            color: #64748b;
        }

        body.light-mode .surah-row.playing .row-num,
        body.light-mode .surah-row:hover .row-num {
            background: var(--primary-dim);
            color: var(--primary);
        }

        body.light-mode .row-name {
            color: #0f172a;
        }

        body.light-mode .row-meta {
            color: #64748b;
        }

        body.light-mode .row-arabic {
            color: #475569;
        }

        body.light-mode .row-duration {
            color: #94a3b8;
        }

        body.light-mode .side-panel {
            background: rgba(248, 250, 252, 0.99);
            border-left-color: rgba(0, 0, 0, 0.08);
        }

        body.light-mode .panel-hd {
            border-bottom-color: rgba(0, 0, 0, 0.07);
        }

        body.light-mode .panel-hd-title {
            color: #0f172a;
        }

        body.light-mode .panel-srch {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.1);
            color: #0f172a;
        }

        body.light-mode .panel-en {
            color: #0f172a;
        }

        body.light-mode .panel-pg {
            color: #94a3b8;
        }

        body.light-mode .panel-row:hover {
            background: rgba(16, 185, 129, 0.08);
        }

        body.light-mode .back-top {
            box-shadow: 0 8px 20px rgba(16, 185, 129, .2);
        }

        @media(max-width:640px) {
            .hero-inner {
                grid-template-columns: 1fr;
                text-align: center
            }

            .avatar-wrap {
                margin: auto
            }

            .hero-meta {
                justify-content: center
            }

            .stats-bar {
                grid-template-columns: 1fr
            }

            .stat-item {
                border-right: none;
                border-bottom: 1px solid var(--border)
            }

            .stat-item:last-child {
                border-bottom: none
            }

            .surah-row {
                grid-template-columns: 44px 1fr auto
            }

            .row-duration {
                display: none
            }

            /* BUG FIX: previously this hid .sp-progress-wrap on mobile,
               which is why the progress bar vanished on phones. We now
               keep it visible so users can scrub through the full surah. */
            .sp-progress-wrap {
                display: flex;
                order: 3;
                flex: 1 1 100%;
                width: 100%;
                margin-top: .2rem;
            }

            /* On very small screens, stack the sticky player vertically
               so info / controls / progress each get their own row.
               Order: 1) info  2) controls  3) progress bar */
            .sticky-player {
                flex-wrap: wrap;
                gap: .5rem 1.2rem;
                padding: .7rem 6%;
                top: 60px;
            }

            .sp-info {
                order: 1;
                flex: 1 1 100%;
                min-width: 0;
                text-align: center;
            }

            .sp-controls {
                order: 2;
                flex: 1 1 auto;
                justify-content: center;
            }

            /* Make the progress bar taller on mobile for easier touch */
            .sp-progress {
                height: 8px;
                min-width: 0;
            }

            .sp-time {
                font-size: .72rem;
            }
        }
    </style>
</head>

<body>

    <!-- ============================================================
         BACA — RECITER PROFILE (reciters/reciter.html)
         Opened via reciters/index.html?r=<id> (or salah.html/adhkar.html
         reciter picker) — the ?r= id is read by this page's script to
         load the matching profile from RECITER_PROFILES.
         ============================================================
         PAGE OUTLINE
         ------------------------------------------------------------
         1. Navbar
         2. Sticky player (prev/play/next, surah + reciter name,
            progress bar — visible once playback starts)
         3. Hero (reciter avatar, name, country, style)
         4. Surah section (searchable list of all 114 surahs, tap
            to play with this reciter)
         5. Audio element + back-to-top button
         6. Script: light-mode sync, reciter profile lookup, surah
            list rendering + search, sticky player wiring
         ============================================================ -->

    <header class="navbar">
        <a href="../index.html" class="logo">
            <svg class="baca-logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true">
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z"
                    fill="url(#bacaLogoGrad)" opacity="0.18" />
                <path d="M24 14C20 12 14 11 8 12V36C14 35 20 36 24 38C28 36 34 35 40 36V12C34 11 28 12 24 14Z"
                    stroke="url(#bacaLogoGrad)" stroke-width="1.8" stroke-linejoin="round" />
                <line x1="24" y1="14" x2="24" y2="38" stroke="url(#bacaLogoGrad)" stroke-width="1.5"
                    stroke-linecap="round" />

        // ═══════════════════════════════════════════════
        // BOOT — read reciter id from URL
        // e.g. reciter.html?r=ali_jaber  →  loads Ali Jaber
        // ═══════════════════════════════════════════════
        const reciterId = new URLSearchParams(location.search).get("r") || "mishari";
        const reciterData = RECITERS[reciterId] || RECITERS["mishari"];

        const audio = document.getElementById("reciter-audio");
        let currentSurahId = null;
        let isPlaying = false;

        // ── helpers ──
        function pad3(n) { return String(n).padStart(3, "0"); }

        // BUG FIX 1: audio URL now uses reciterData.folder from ABOVE — NOT hardcoded
        // This is why clicking Ali Jaber was playing Mishary — the folder wasn't being read
        function audioUrl(surahId) {
            // EveryAyah full-surah format: folder/SSSAAA.mp3 where AAA=000 is full surah
            // If that 000 file doesn't exist we fall back to ayah 001
            return `https://everyayah.com/data/${reciterData.folder}/${pad3(surahId)}001.mp3`;
        }

        function fmt(s) {
            if (!s || isNaN(s)) return "0:00";
            return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
        }

        // ── HERO ──
        function populateHero() {
            document.title = `${reciterData.name} — Al Furqan`;
            document.getElementById("reciter-name").textContent = reciterData.name;
            document.getElementById("reciter-arabic-name").textContent = reciterData.arabic;
            document.getElementById("stat-style").textContent = reciterData.style;
            document.getElementById("sp-reciter-name").textContent = reciterData.name;

            // Avatar — placeholder is visible by default (see HTML). We only
            // swap in the real photo once it is CONFIRMED loaded (onload),
            // and keep the placeholder up on failure (onerror). This avoids
            // the old race where an empty initial src="" could trip the
            // onerror handler before this script ever ran, permanently
            // hiding the <img> even after the real photo loaded fine.
            const img = document.getElementById("reciter-avatar");
            const placeholder = document.getElementById("avatar-placeholder");

            img.onload = () => {
                img.style.display = "block";
                placeholder.style.display = "none";
            };
            img.onerror = () => {
                img.style.display = "none";
                placeholder.style.display = "flex";
            };
            img.alt = reciterData.name;
            img.src = reciterData.image;

            document.getElementById("reciter-meta").innerHTML = `

            const bioEl = document.getElementById("reciter-bio");
            const toggleEl = document.getElementById("bio-toggle");
            bioEl.textContent = reciterData.bio;
            // show toggle only when bio is clipped
            setTimeout(() => {
                if (bioEl.scrollHeight > bioEl.clientHeight + 4) {
                    toggleEl.style.display = "block";
                    toggleEl.addEventListener("click", () => {
                        bioEl.classList.toggle("expanded");
                        toggleEl.textContent = bioEl.classList.contains("expanded") ? "Read less" : "Read more";

        }

        // ── RENDER ROWS ──
        function renderSurahs(list) {
            const el = document.getElementById("surah-list");
            if (!list.length) {
                el.innerHTML = `<div class="no-results"><i class="fa-solid fa-face-sad-tear"></i><p>No surahs match your search.</p></div>`;
                return;
            }
            el.innerHTML = list.map(s => `
    <div class="surah-row" id="row-${s.id}" data-id="${s.id}" tabindex="0" role="button" aria-label="Play ${s.tr}">

      </div>
      <div class="row-info">
        <div class="row-name">${s.tr}</div>
        <div class="row-meta">${s.meaning} · ${s.verses} verses · ${s.type}</div>
      </div>
      <div class="wave-bars">
        <div class="wave-bar" style="height:35%"></div>
        <div class="wave-bar" style="height:65%"></div>
        <div class="wave-bar" style="height:100%"></div>
        <div class="wave-bar" style="height:55%"></div>
        <div class="wave-bar" style="height:80%"></div>
      </div>
      <div class="row-arabic">${s.name}</div>
      <div class="row-duration" id="dur-${s.id}">—</div>
    </div>`).join("");

            el.querySelectorAll(".surah-row").forEach(row => {
                row.addEventListener("click", () => toggleSurah(Number(row.dataset.id)));
                row.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") toggleSurah(Number(row.dataset.id)); });

        }

        // ── PLAY LOGIC ──
        // BUG FIX (full-surah audio): previously this played the surah
        // ayah-by-ayah via everyayah.com (each ayah = separate mp3), which
        // meant the progress bar reset every few seconds and users couldn't
        // seek/scrub to a later part of the surah.
        //
        // NOW we use mp3quran.net full-surah MP3s (one file per surah) so
        // the progress bar shows the entire surah duration and the user can
        // drag to any position. When a surah finishes, we auto-advance to
        // the next surah — same behaviour as before, just smoother.
        //
        // Fallback: if a reciter doesn't have a full-surah server entry in
        // data.js FULL_SURAH_SERVERS, we fall back to the old ayah-by-ayah
        // behaviour so audio still plays.

        // Full-surah server map (mirrors js/data.js FULL_SURAH_SERVERS so
        // this page is self-contained even though data.js is not loaded).
        const FULL_SURAH_SERVERS = {
            'mishari': 'https://server8.mp3quran.net/afs/',
            'sudais': 'https://server11.mp3quran.net/sds/',
            'abdulbasit': 'https://server7.mp3quran.net/basit/',
            'husary': 'https://server13.mp3quran.net/husr/',
            'minshawi': 'https://server10.mp3quran.net/minsh/',
            'shaatree': 'https://server11.mp3quran.net/shatri/',
            'muaiqly': 'https://server12.mp3quran.net/maher/',
            'shuraym': 'https://server7.mp3quran.net/shur/',
            'hudhaify': 'https://server8.mp3quran.net/bna/',
            'ajamy': 'https://server10.mp3quran.net/ajm/',
            'jibreel': 'https://server8.mp3quran.net/jbrl/',
            'ayyoub': 'https://server16.mp3quran.net/ayyoub2/',
            'ghamdi': 'https://server7.mp3quran.net/s_gmd/',
            'basfar': 'https://server6.mp3quran.net/bsfr/',
            'matroud': 'https://server8.mp3quran.net/mtrod/',
            'rifai': 'https://server8.mp3quran.net/hani/',
            'tablawi': 'https://server12.mp3quran.net/tblawi/',
            'okasha': 'https://server16.mp3quran.net/okasha/Rewayat-Albizi-A-n-Ibn-Katheer/'
        };

        function getFullSurahAudioUrl(surahNum, reciterId) {
            const server = FULL_SURAH_SERVERS[reciterId] || FULL_SURAH_SERVERS['mishari'];
            const padded = String(surahNum).padStart(3, '0');
            return server + padded + '.mp3';
        }

        function hasFullSurahAudio(reciterId) {
            return Object.prototype.hasOwnProperty.call(FULL_SURAH_SERVERS, reciterId);
        }

        function toggleSurah(id) {
            if (currentSurahId === id) {
                isPlaying ? audio.pause() : audio.play();
                return;
            }
            playSurahFromStart(id);
        }

        function playSurahFromStart(id) {
            const s = SURAH_LIST.find(x => x.id === id);
            if (!s) return;
            if (currentSurahId) document.getElementById(`row-${currentSurahId}`)?.classList.remove("playing");
            currentSurahId = id;

            if (hasFullSurahAudio(reciterId)) {
                // Full-surah MP3 — progress bar will span the whole surah
                audio.src = getFullSurahAudioUrl(id, reciterId);
                audio.load();
                audio.play().then(() => { setPlaying(true); }).catch(() => { setPlaying(false); });
                audio.onended = () => {
                    // Auto-advance to next surah
                    const nextId = id < 114 ? id + 1 : null;
                    if (nextId) playSurahFromStart(nextId);
                    else setPlaying(false);
                };
            } else {
                // Fallback: ayah-by-ayah (only used for reciters not in FULL_SURAH_SERVERS)
                surahAyahCursor = 1;
                loadAndPlayAyah(id, 1, s.verses);
            }

            document.getElementById("sp-surah-name").textContent = `${s.tr} · ${s.name}`;
            document.getElementById("sticky-player").classList.add("visible");
            document.getElementById(`row-${id}`)?.classList.add("playing");
            document.getElementById(`row-${id}`)?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        // Ayah-by-ayah fallback (kept for reciters with no full-surah server)
        let surahAyahCursor = 1;
        function loadAndPlayAyah(surahId, ayahNum, totalAyahs) {
            audio.src = `https://everyayah.com/data/${reciterData.folder}/${pad3(surahId)}${pad3(ayahNum)}.mp3`;
            audio.load();
            audio.play().then(() => { setPlaying(true); }).catch(() => { setPlaying(false); });
            audio.onended = () => {
                if (ayahNum < totalAyahs) {
                    surahAyahCursor = ayahNum + 1;
                    loadAndPlayAyah(surahId, surahAyahCursor, totalAyahs);
                } else {
                    const nextId = surahId < 114 ? surahId + 1 : null;
                    if (nextId) playSurahFromStart(nextId);
                    else setPlaying(false);
                }
            };
        }

        function setPlaying(state) {
            isPlaying = state;
            document.getElementById("sp-play-icon").className = state ? "fa-solid fa-pause" : "fa-solid fa-play";
            if (currentSurahId) {
                document.getElementById(`row-${currentSurahId}`)?.classList.toggle("playing", state);
            }
        }

        // ── AUDIO PROGRESS ──
        audio.addEventListener("timeupdate", () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById("sp-fill").style.width = pct + "%";
            document.getElementById("sp-current").textContent = fmt(audio.currentTime);
            document.getElementById("sp-duration").textContent = fmt(audio.duration);
        });
        audio.addEventListener("loadedmetadata", () => {
            if (currentSurahId) document.getElementById(`dur-${currentSurahId}`).textContent = fmt(audio.duration);
        });
        audio.addEventListener("play", () => setPlaying(true));
        audio.addEventListener("pause", () => setPlaying(false));

        // ── STICKY CONTROLS ──
        document.getElementById("sp-play").addEventListener("click", () => {
            if (!currentSurahId) return;
            isPlaying ? audio.pause() : audio.play();
        });
        document.getElementById("sp-prev").addEventListener("click", () => {
            if (currentSurahId > 1) playSurahFromStart(currentSurahId - 1);
        });
        document.getElementById("sp-next").addEventListener("click", () => {
            if (currentSurahId < 114) playSurahFromStart(currentSurahId + 1);
        });
        // ── SEEKABLE PROGRESS BAR ──
        // Upgraded from a simple click handler to a full drag/seek handler
        // so users on both mobile and desktop can scrub through the surah.
        // Supports: click-to-jump, touch-drag, mouse-drag.
        (function wireSeekableProgress() {
            const bar = document.getElementById("sp-progress-bar");
            const fill = document.getElementById("sp-fill");
            if (!bar || !fill) return;

            let isDragging = false;

            function setProgressFromX(clientX) {
                if (!audio.duration || isNaN(audio.duration)) return;
                const r = bar.getBoundingClientRect();
                let pct = (clientX - r.left) / r.width;
                pct = Math.max(0, Math.min(1, pct));
                // Update visual immediately for responsiveness
                fill.style.width = (pct * 100) + "%";
                // Set audio position
                audio.currentTime = pct * audio.duration;
                // Update current time label live while dragging
                const cur = document.getElementById("sp-current");
                if (cur) cur.textContent = fmt(audio.currentTime);
            }

            // Mouse: click + drag
            bar.addEventListener("mousedown", e => {
                isDragging = true;
                setProgressFromX(e.clientX);
            });
            document.addEventListener("mousemove", e => {
                if (isDragging) setProgressFromX(e.clientX);
            });
            document.addEventListener("mouseup", () => { isDragging = false; });

            // Touch: tap + drag (this is what makes it work on mobile)
            bar.addEventListener("touchstart", e => {
                isDragging = true;
                if (e.touches[0]) setProgressFromX(e.touches[0].clientX);
            }, { passive: true });
            bar.addEventListener("touchmove", e => {
                if (isDragging && e.touches[0]) {
                    setProgressFromX(e.touches[0].clientX);
                    e.preventDefault(); // stop page from scrolling while dragging
                }
            }, { passive: false });
            bar.addEventListener("touchend", () => { isDragging = false; });

            // Keep the old click handler too for simple click-to-jump
            bar.addEventListener("click", e => setProgressFromX(e.clientX));
        })();

        // ── SEARCH ──
        document.getElementById("surah-search").addEventListener("input", e => {
            const q = e.target.value.trim().toLowerCase();
            renderSurahs(q
                ? SURAH_LIST.filter(s =>
                    s.tr.toLowerCase().includes(q) ||
                    s.meaning.toLowerCase().includes(q) ||
                    s.name.includes(q) ||
                    String(s.id) === q)
                : [...SURAH_LIST]);
        });

        // ── BACK TO TOP ──
        const backTop = document.getElementById("back-top");
        window.addEventListener("scroll", () => backTop.classList.toggle("show", window.scrollY > 400));
        backTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

        // ── INIT ──
        populateHero();
        renderSurahs(SURAH_LIST);

        const autoSurah = Number(new URLSearchParams(location.search).get("surah"));
        if (autoSurah >= 1 && autoSurah <= 114) {
            setTimeout(() => playSurahFromStart(autoSurah), 800);
        }
    </script>

    <!-- Shared hamburger menu (floating button + slide-in drawer) -->
    <script src="../js/shared-nav.js"></script>

</body>
