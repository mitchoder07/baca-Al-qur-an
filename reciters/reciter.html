<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reciter Profile — Al Furqan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dim: rgba(16, 185, 129, 0.12);
            --dark: #0f172a;
            --dark-mid: #1e293b;
            --dark-light: #263247;
            --white: #ffffff;
            --text: #cbd5e1;
            --subtext: #64748b;
            --border: rgba(255, 255, 255, 0.07);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: "Poppins", sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh
        }

        /* ── NAV ── */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none
        }

        .nav-back {
            display: flex;
            align-items: center;
            gap: .5rem;
            color: var(--text);
            text-decoration: none;
            font-size: .9rem;
            font-weight: 500;
            padding: .5rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: .2s;
        }

        .nav-back:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        /* ── HERO ── */
        .reciter-hero {
            padding: 7rem 6% 3rem;
            background: linear-gradient(180deg, rgba(16, 185, 129, 0.04) 0%, transparent 60%);
            position: relative;
            overflow: hidden;
        }

        .reciter-hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(16, 185, 129, 0.08), transparent);
            pointer-events: none;
        }

        .hero-inner {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 2.5rem;
            align-items: center;
        }

        /* ── AVATAR ── */
        .avatar-wrap {
            position: relative;
            width: 180px;
            height: 180px;
            flex-shrink: 0
        }

        .avatar-ring {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            padding: 4px;
            background: linear-gradient(135deg, rgba(16, 185, 129, .2), transparent);
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: var(--dark-mid);
            display: block;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--dark-mid), var(--dark-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary);
        }

        .online-dot {
            position: absolute;
            bottom: 12px;
            right: 12px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary);
            border: 3px solid var(--dark);
        }

        /* ── HERO INFO ── */
        .hero-info {}

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            padding: .3rem .85rem;
            border-radius: 999px;
            background: var(--primary-dim);
            color: var(--primary);
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            margin-bottom: .9rem;
        }

        .hero-name {
            font-size: 2.4rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: .3rem
        }

        .hero-name-arabic {
            font-family: "Amiri", serif;
            font-size: 1.5rem;
            color: var(--primary);
            direction: rtl;
            margin-bottom: .7rem;
            opacity: .85;
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: .6rem;
            margin-bottom: 1.2rem;
        }

        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: .35rem;
            padding: .35rem .85rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: .8rem;
            font-weight: 500;
        }

        .meta-pill i {
            color: var(--primary);
            font-size: .75rem
        }

        .hero-bio {
            color: var(--text);
            line-height: 1.8;
            font-size: .93rem;
            max-height: 3.6em;
            overflow: hidden;
            position: relative;
            transition: max-height .4s ease;
        }

        .hero-bio.expanded {
            max-height: 40em
        }

        .bio-toggle {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: .82rem;
            font-weight: 600;
            margin-top: .4rem;
            display: block;
            padding: 0;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            max-width: 900px;
            margin: 1.5rem auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            background: var(--dark-mid);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .stat-item {
            padding: 1.2rem;
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .stat-item:last-child {
            border-right: none
        }

        .stat-num {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary)
        }

        .stat-label {
            font-size: .75rem;
            color: var(--subtext);
            margin-top: .2rem;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        /* ── STICKY AUDIO PLAYER ── */
        .sticky-player {
            position: sticky;
            top: 65px;
            z-index: 500;
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: .9rem 6%;
            display: none;
            align-items: center;
            gap: 1.2rem;
            transition: .3s;
        }

        .sticky-player.visible {
            display: flex
        }

        .sp-info {
            flex: 1;
            min-width: 0
        }

        .sp-surah {
            font-weight: 700;
            font-size: .9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .sp-reciter {
            font-size: .75rem;
            color: var(--subtext)
        }

        .sp-controls {
            display: flex;
            align-items: center;
            gap: .7rem
        }

        .sp-btn {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.06);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }

        .sp-btn:hover {
            background: var(--primary);
            transform: scale(1.05)
        }

        .sp-play {
            width: 46px;
            height: 46px;
            background: var(--primary) !important
        }

        .sp-progress-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: .7rem
        }

        .sp-time {
            font-size: .75rem;
            color: var(--subtext);
            white-space: nowrap
        }

        .sp-progress {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 99px;
            cursor: pointer;
            position: relative;
        }

        .sp-progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 99px;
            width: 0%;
            transition: width .2s linear
        }

        /* ── SURAH LIST SECTION ── */
        .surah-section {
            padding: 2rem 6% 5rem;
            max-width: 960px;
            margin: auto
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .6rem;
        }

        .section-title i {
            color: var(--primary)
        }

        /* ── SEARCH ── */
        .search-wrap {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .search-wrap i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--subtext);
            pointer-events: none;
            font-size: .95rem;
        }

        .surah-search-input {
            width: 100%;
            height: 52px;
            padding-left: 46px;
            padding-right: 1rem;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--white);
            font-family: inherit;
            font-size: .95rem;
            outline: none;
            transition: .2s;
        }

        .surah-search-input:focus {
            border-color: var(--primary)
        }

        .surah-search-input::placeholder {
            color: var(--subtext)
        }

        /* ── SURAH ROWS ── */
        .surah-list {
            display: flex;
            flex-direction: column;
            gap: .5rem
        }

        .surah-row {
            display: grid;
            grid-template-columns: 52px 1fr auto auto;
            align-items: center;
            gap: 1rem;
            padding: .9rem 1.2rem;
            border-radius: 16px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.025);
            transition: .2s;
            cursor: pointer;
        }

        .surah-row:hover {
            background: rgba(16, 185, 129, 0.06);
            border-color: rgba(16, 185, 129, 0.2);
            transform: translateX(4px);
        }

        .surah-row.playing {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .row-num {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: .85rem;
            color: var(--subtext);
            transition: .2s;
            position: relative;
        }

        .surah-row.playing .row-num,
        .surah-row:hover .row-num {
            background: var(--primary-dim);
            color: var(--primary);
        }

        .row-play-icon {
            display: none;
            position: absolute
        }

        .surah-row:hover .row-num-text,
        .surah-row.playing .row-num-text {
            display: none
        }

        .surah-row:hover .row-play-icon,
        .surah-row.playing .row-play-icon {
            display: block
        }

        .surah-row.playing .row-play-icon.pause-icon {
            display: block
        }

        .surah-row.playing .row-play-icon.play-icon {
            display: none
        }

        .surah-row:not(.playing):hover .row-play-icon.play-icon {
            display: block
        }

        .surah-row:not(.playing):hover .row-play-icon.pause-icon {
            display: none
        }

        .row-info {}

        .row-name {
            font-weight: 600;
            font-size: .95rem;
            margin-bottom: .15rem
        }

        .row-meta {
            font-size: .78rem;
            color: var(--subtext)
        }

        .row-arabic {
            font-family: "Amiri", serif;
            font-size: 1.3rem;
            color: var(--text);
            direction: rtl;
            text-align: right;
        }

        .row-duration {
            font-size: .78rem;
            color: var(--subtext);
            white-space: nowrap;
            min-width: 40px;
            text-align: right;
        }

        /* ── PLAYING BAR (wave animation) ── */
        .wave-bars {
            display: none;
            align-items: flex-end;
            gap: 2px;
            height: 16px;
        }

        .surah-row.playing .wave-bars {
            display: flex
        }

        .surah-row.playing .row-arabic {
            display: none
        }

        .wave-bar {
            width: 3px;
            border-radius: 2px;
            background: var(--primary);
            animation: wave .8s ease-in-out infinite;
        }

        .wave-bar:nth-child(2) {
            animation-delay: .15s;
            height: 60%
        }

        .wave-bar:nth-child(3) {
            animation-delay: .3s;
            height: 90%
        }

        .wave-bar:nth-child(4) {
            animation-delay: .45s;
            height: 50%
        }

        .wave-bar:nth-child(5) {
            animation-delay: .6s;
            height: 75%
        }

        @keyframes wave {

            0%,
            100% {
                height: 30%
            }

            50% {
                height: 100%
            }
        }

        /* ── EMPTY ── */
        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--subtext);
        }

        .no-results i {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: .8rem;
            display: block
        }

        /* ── BACK TO TOP ── */
        .back-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: 0 8px 20px rgba(16, 185, 129, .35);
            transition: .25s;
            z-index: 800;
        }

        .back-top.show {
            display: flex
        }

        .back-top:hover {
            transform: translateY(-3px)
        }

        /* ── RESPONSIVE ── */
        @media(max-width:640px) {
            .hero-inner {
                grid-template-columns: 1fr;
                text-align: center
            }

            .avatar-wrap {
                margin: auto
            }

            .hero-meta {
                justify-content: center
            }

            .stats-bar {
                grid-template-columns: 1fr
            }

            .stat-item {
                border-right: none;
                border-bottom: 1px solid var(--border)
            }

            .stat-item:last-child {
                border-bottom: none
            }

            .surah-row {
                grid-template-columns: 42px 1fr auto
            }

            .row-duration {
                display: none
            }

            .sp-progress-wrap {
                display: none
            }
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <header class="navbar">
        <a class="nav-logo" href="../index.html">Al Furqan</a>
        <a class="nav-back" href="../index.html#featured-reciters">
            <i class="fa-solid fa-arrow-left"></i> Back to Reciters
        </a>
    </header>

    <!-- STICKY PLAYER -->
    <div class="sticky-player" id="sticky-player">
        <div class="sp-controls">
            <button class="sp-btn" id="sp-prev" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
            <button class="sp-btn sp-play" id="sp-play" title="Play / Pause"><i class="fa-solid fa-play"
                    id="sp-play-icon"></i></button>
            <button class="sp-btn" id="sp-next" title="Next"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <div class="sp-info">
            <div class="sp-surah" id="sp-surah-name">—</div>
            <div class="sp-reciter" id="sp-reciter-name">—</div>
        </div>
        <div class="sp-progress-wrap">
            <span class="sp-time" id="sp-current">0:00</span>
            <div class="sp-progress" id="sp-progress-bar">
                <div class="sp-progress-fill" id="sp-fill"></div>
            </div>
            <span class="sp-time" id="sp-duration">0:00</span>
        </div>
    </div>

    <!-- HERO -->
    <section class="reciter-hero" id="hero">
        <div class="hero-inner">
            <div class="avatar-wrap">
                <div class="avatar-ring">
  
                    <img class="avatar-img" id="reciter-avatar" src="/reciters/images/mishary.png" alt=""
                        onerror="this.style.display='none';document.getElementById('avatar-placeholder').style.display='flex'">
                    <div class="avatar-placeholder" id="avatar-placeholder" style="display:none">
                        <i class="fa-solid fa-microphone"></i>
                    </div>
                </div>
                <div class="online-dot"></div>
            </div>

            <div class="hero-info">
                <div class="hero-badge"><i class="fa-solid fa-circle-check"></i> Verified Reciter</div>
                <h1 class="hero-name" id="reciter-name">Loading…</h1>
                <div class="hero-name-arabic" id="reciter-arabic-name"></div>
                <div class="hero-meta" id="reciter-meta"></div>
                <p class="hero-bio" id="reciter-bio"></p>
                <button class="bio-toggle" id="bio-toggle" style="display:none">Read more</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-num">114</div>
                <div class="stat-label">Surahs Available</div>
            </div>
            <div class="stat-item">
                <div class="stat-num">6,236</div>
                <div class="stat-label">Verses Recited</div>
            </div>
            <div class="stat-item">
                <div class="stat-num" id="stat-style">Murattal</div>
                <div class="stat-label">Recitation Style</div>
            </div>
        </div>
    </section>

    <!-- SURAH LIST -->
    <section class="surah-section">
        <h2 class="section-title"><i class="fa-solid fa-book-quran"></i> All Surahs</h2>

        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="surah-search-input" id="surah-search"
                placeholder="Search by name, number or meaning…">
        </div>

        <div class="surah-list" id="surah-list">
            <div class="no-results"><i class="fa-solid fa-spinner fa-spin"></i>
                <p>Loading surahs…</p>
            </div>
        </div>
    </section>

    <!-- HIDDEN AUDIO -->
    <audio id="reciter-audio"></audio>

    <!-- BACK TO TOP -->
    <button class="back-top" id="back-top" title="Back to top"><i class="fa-solid fa-chevron-up"></i></button>

        let reciterId = new URLSearchParams(location.search).get("r") || "mishari";
        let reciterData = RECITERS[reciterId] || RECITERS["mishari"];
        let currentSurah = null;
        let isPlaying = false;
        let filteredSurahs = [...SURAH_LIST];

        const audio = document.getElementById("reciter-audio");

        // ── HELPERS ──
        function pad3(n) { return String(n).padStart(3, "0"); }
        function audioUrl(surahId) {
            return `https://everyayah.com/data/${reciterData.folder}/${pad3(surahId)}001.mp3`;
        }
        function fmt(s) {
            if (!s || isNaN(s)) return "0:00";
            return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
        }

        // ── POPULATE HERO ──
        function populateHero() {
            document.title = `${reciterData.name} — Al Furqan`;
            document.getElementById("reciter-name").textContent = reciterData.name;
            document.getElementById("reciter-arabic-name").textContent = reciterData.arabic;
            document.getElementById("stat-style").textContent = reciterData.style;
            document.getElementById("sp-reciter-name").textContent = reciterData.name;

            // Avatar — you place images at images/reciters/{id}.jpg
            const img = document.getElementById("reciter-avatar");
            img.src = reciterData.image;
            img.alt = reciterData.name;

            // Meta pills
            const metaEl = document.getElementById("reciter-meta");
            metaEl.innerHTML = `
    <span class="meta-pill"><i class="fa-solid fa-earth-africa"></i>${reciterData.country}</span>
    <span class="meta-pill"><i class="fa-solid fa-music"></i>${reciterData.style}</span>
    <span class="meta-pill"><i class="fa-solid fa-star"></i>Featured Reciter</span>`;

            // Bio
            const bioEl = document.getElementById("reciter-bio");
            const toggleEl = document.getElementById("bio-toggle");
            bioEl.textContent = reciterData.bio;
            // Show toggle only if text overflows
            setTimeout(() => {
                if (bioEl.scrollHeight > bioEl.clientHeight + 2) {
                    toggleEl.style.display = "block";
                    toggleEl.addEventListener("click", () => {
                        bioEl.classList.toggle("expanded");
                        toggleEl.textContent = bioEl.classList.contains("expanded") ? "Read less" : "Read more";
                    });
                }
            }, 100);
        }

        // ── RENDER SURAH LIST ──
        function renderSurahs(list) {
            const el = document.getElementById("surah-list");
            if (!list.length) {
                el.innerHTML = `<div class="no-results"><i class="fa-solid fa-face-sad-tear"></i><p>No surahs match your search.</p></div>`;
                return;
            }
            el.innerHTML = list.map(s => `
    <div class="surah-row" data-id="${s.id}" id="row-${s.id}" role="button" tabindex="0" aria-label="Play ${s.tr}">
      <div class="row-num">
        <span class="row-num-text">${s.id}</span>
        <i class="fa-solid fa-play row-play-icon play-icon"></i>
        <i class="fa-solid fa-pause row-play-icon pause-icon"></i>
      </div>
      <div class="row-info">
        <div class="row-name">${s.tr}</div>
        <div class="row-meta">${s.meaning} · ${s.verses} verses · ${s.type}</div>
      </div>
      <div class="wave-bars">
        <div class="wave-bar" style="height:40%"></div>
        <div class="wave-bar" style="height:60%"></div>
        <div class="wave-bar" style="height:90%"></div>
        <div class="wave-bar" style="height:50%"></div>
        <div class="wave-bar" style="height:75%"></div>
      </div>
      <div class="row-arabic">${s.name}</div>
      <div class="row-duration" id="dur-${s.id}">—</div>
    </div>`).join("");

            el.querySelectorAll(".surah-row").forEach(row => {
                row.addEventListener("click", () => toggleSurah(Number(row.dataset.id)));
                row.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") toggleSurah(Number(row.dataset.id)); });
            });
        }

        // ── PLAY / PAUSE LOGIC ──
        function toggleSurah(id) {
            if (currentSurah === id) {
                if (isPlaying) { audio.pause(); setPlaying(false); }
                else { audio.play(); setPlaying(true); }
                return;
            }
            playSurah(id);
        }

        function playSurah(id) {
            const s = SURAH_LIST.find(x => x.id === id);
            if (!s) return;
            // Clear old row
            if (currentSurah) {
                document.getElementById(`row-${currentSurah}`)?.classList.remove("playing");
            }
            currentSurah = id;
            audio.src = audioUrl(id);
            audio.load();
            audio.play().catch(() => { });
            setPlaying(true);
            // Update sticky player
            document.getElementById("sp-surah-name").textContent = `${s.tr} (${s.name})`;
            document.getElementById("sticky-player").classList.add("visible");
            document.getElementById(`row-${id}`)?.classList.add("playing");
            document.getElementById(`row-${id}`)?.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }

        function setPlaying(state) {
            isPlaying = state;
            const icon = document.getElementById("sp-play-icon");
            icon.className = state ? "fa-solid fa-pause" : "fa-solid fa-play";
            // Row pause icon
            if (currentSurah) {
                const row = document.getElementById(`row-${currentSurah}`);
                if (row) {
                    if (state) row.classList.add("playing");
                    else row.classList.remove("playing");
                }
            }
        }

        // ── AUDIO EVENTS ──
        audio.addEventListener("timeupdate", () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById("sp-fill").style.width = pct + "%";
            document.getElementById("sp-current").textContent = fmt(audio.currentTime);
            document.getElementById("sp-duration").textContent = fmt(audio.duration);
        });

        audio.addEventListener("loadedmetadata", () => {
            if (currentSurah) document.getElementById(`dur-${currentSurah}`).textContent = fmt(audio.duration);
        });

        audio.addEventListener("ended", () => {
            // Auto-advance
            const next = currentSurah < 114 ? currentSurah + 1 : null;
            if (next) playSurah(next);
            else setPlaying(false);
        });

        // ── STICKY PLAYER CONTROLS ──
        document.getElementById("sp-play").addEventListener("click", () => {
            if (!currentSurah) return;
            if (isPlaying) { audio.pause(); setPlaying(false); }
            else { audio.play(); setPlaying(true); }
        });
        document.getElementById("sp-prev").addEventListener("click", () => {
            if (currentSurah > 1) playSurah(currentSurah - 1);
        });
        document.getElementById("sp-next").addEventListener("click", () => {
            if (currentSurah < 114) playSurah(currentSurah + 1);
        });

        // Progress click
        document.getElementById("sp-progress-bar").addEventListener("click", e => {
            const rect = e.currentTarget.getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        });

        // ── SEARCH ──
        document.getElementById("surah-search").addEventListener("input", e => {
            const q = e.target.value.trim().toLowerCase();
            filteredSurahs = q
                ? SURAH_LIST.filter(s =>
                    s.tr.toLowerCase().includes(q) ||
                    s.meaning.toLowerCase().includes(q) ||
                    s.name.includes(q) ||
                    String(s.id) === q)
                : [...SURAH_LIST];
            renderSurahs(filteredSurahs);
        });

        // ── BACK TO TOP ──
        const backTop = document.getElementById("back-top");
        window.addEventListener("scroll", () => {
            backTop.classList.toggle("show", window.scrollY > 400);
        });
        backTop.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));

        // ── INIT ──
        populateHero();
        renderSurahs(SURAH_LIST);
    </script>
</body>

</html>
